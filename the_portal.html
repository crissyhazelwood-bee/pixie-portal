<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>The Portal ✦ Pixie Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&family=Pacifico&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:#060410; overflow:hidden; font-family:'Quicksand',sans-serif; touch-action:none; user-select:none; -webkit-user-select:none; }
        canvas { display:block; }

        #start-screen {
            position:fixed; inset:0; z-index:100;
            display:flex; flex-direction:column; justify-content:center; align-items:center;
            cursor:pointer;
            background: radial-gradient(ellipse at center, rgba(30,10,60,0.98) 0%, rgba(5,2,12,0.99) 100%);
        }
        #start-screen h1 {
            font-family:'Pacifico',cursive; font-size:54px;
            background:linear-gradient(135deg,#ff96c8,#b496ff,#96ffdc,#ff96c8);
            background-size:300% 300%; -webkit-background-clip:text; background-clip:text;
            -webkit-text-fill-color:transparent; animation:gradShift 5s ease infinite;
            margin-bottom:6px; padding:0 10px;
        }
        @keyframes gradShift { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }
        .portal-orb { font-size:90px; margin:14px 0; animation:orbPulse 4s ease-in-out infinite; filter:drop-shadow(0 0 40px rgba(180,150,255,0.7)); }
        @keyframes orbPulse { 0%,100%{transform:scale(1) rotate(0deg)} 50%{transform:scale(1.08) rotate(5deg)} }
        .step-text { color:#b496ff; font-size:21px; font-weight:600; margin-top:16px; animation:blink 2s ease-in-out infinite; letter-spacing:2px; }
        @keyframes blink { 0%,100%{opacity:0.35} 50%{opacity:1} }
        .start-hint { color:#504060; font-size:13px; margin-top:12px; letter-spacing:1px; }

        #ui {
            position:fixed; top:0; left:0; right:0; padding:10px 20px;
            display:none; justify-content:space-between; align-items:center;
            z-index:10; pointer-events:none;
            background:linear-gradient(180deg,rgba(6,4,16,0.88) 0%,transparent 100%);
        }
        #ui > * { pointer-events:auto; }
        .back-btn { color:#b496ff; font-size:13px; cursor:pointer; padding:6px 14px; border:1px solid rgba(180,150,255,0.3); border-radius:20px; }
        .back-btn:hover { border-color:#ff96c8; color:#ff96c8; }
        #zone-name { color:#f0d0ff; font-size:14px; font-weight:600; letter-spacing:1px; }

        #dpad { position:fixed; bottom:36px; right:22px; z-index:20; display:none; width:132px; height:132px; }
        #dpad button {
            position:absolute; width:44px; height:44px;
            background:rgba(180,150,255,0.14); border:1px solid rgba(180,150,255,0.28);
            border-radius:12px; color:#b496ff; font-size:18px; cursor:pointer;
            display:flex; align-items:center; justify-content:center;
            -webkit-tap-highlight-color:transparent;
        }
        #dpad button:active { background:rgba(180,150,255,0.32); }
        #dpad .d-up    { top:0;    left:44px; }
        #dpad .d-down  { top:88px; left:44px; }
        #dpad .d-left  { top:44px; left:0; }
        #dpad .d-right { top:44px; left:88px; }
    </style>
</head>
<body>
<canvas id="c"></canvas>

<div id="start-screen" onclick="enterPortal()">
    <h1>~ The Portal ~</h1>
    <div class="portal-orb">🌀</div>
    <div class="step-text">Step Through</div>
    <div class="start-hint">Arrow keys · WASD · or D-Pad</div>
</div>

<div id="ui">
    <a class="back-btn" onclick="window.location.href='/'">&#x2190; Portal</a>
    <div id="zone-name">The Meadow</div>
</div>

<div id="dpad">
    <button class="d-up"    onpointerdown="dp('u',1)" onpointerup="dp('u',0)" onpointercancel="dp('u',0)">▲</button>
    <button class="d-down"  onpointerdown="dp('d',1)" onpointerup="dp('d',0)" onpointercancel="dp('d',0)">▼</button>
    <button class="d-left"  onpointerdown="dp('l',1)" onpointerup="dp('l',0)" onpointercancel="dp('l',0)">◀</button>
    <button class="d-right" onpointerdown="dp('r',1)" onpointerup="dp('r',0)" onpointercancel="dp('r',0)">▶</button>
</div>

<script>
window.onerror = function(m,u,l){ document.body.innerHTML='<div style="color:#ff96c8;padding:40px;font-size:15px;">ERROR: '+m+'<br>Line '+l+'</div>'; };

// ── Tile IDs ───────────────────────────────────────────────────────────────────
var TG=0,TD=1,TW=2,TF=3,TK=4,TS=5,TY=6,TN=7,TR=8,TO=9;
var WALK=[1,1,0,1,1,1,1,1,0,0];

// ── Canvas ─────────────────────────────────────────────────────────────────────
var canvas=document.getElementById('c'), ctx=canvas.getContext('2d');
var SW,SH,TW_px,TH_px,HW,HH,OX,OY;
var cam={x:0,y:0};

function resize(){
    canvas.width=window.innerWidth; canvas.height=window.innerHeight;
    SW=canvas.width; SH=canvas.height;
    TW_px=Math.floor(Math.min(80,Math.max(48,Math.min(SW,SH)/10))/2)*2;
    TH_px=TW_px>>1; HW=TW_px>>1; HH=TH_px>>1;
    OX=(SW>>1)-HW; OY=(SH>>1)-HH;
}
window.addEventListener('resize',resize); resize();

// ── Seeded RNG ─────────────────────────────────────────────────────────────────
function mkRng(seed){
    var s=seed;
    return function(){ s=(s*16807)%2147483647; return (s-1)/2147483646; };
}

// ── Map ────────────────────────────────────────────────────────────────────────
var MR=40,MC=55,map;

function buildMap(){
    var rng=mkRng(1337),r,c,i,m=[];
    for(r=0;r<MR;r++){m[r]=[];for(c=0;c<MC;c++)m[r][c]=TG;}

    for(r=0;r<MR;r++) for(c=0;c<MC;c++){
        if(r<2||r>=MR-2||c<2||c>=MC-2) m[r][c]=TR;
        else if(r<4||r>=MR-4||c<4||c>=MC-4) m[r][c]=TK;
    }

    var lR=8,lC=43,lA=4.2,lB=5.5;
    for(r=3;r<MR-3;r++) for(c=3;c<MC-3;c++){
        var d=((r-lR)/lA)*((r-lR)/lA)+((c-lC)/lB)*((c-lC)/lB);
        if(d<1.0) m[r][c]=TW;
        else if(d<1.4&&(m[r][c]===TG||m[r][c]===TK)) m[r][c]=TN;
    }

    var pR=20,pC=27;
    for(c=4;c<MC-4;c++) if(m[pR][c]!==TW&&m[pR][c]!==TR) m[pR][c]=TS;
    for(r=4;r<MR-4;r++) if(m[r][pC]!==TW&&m[r][pC]!==TR) m[r][pC]=TS;
    m[pR][pC]=TY;

    for(r=14;r<pR;r++) if(m[r][43]===TG||m[r][43]===TK) m[r][43]=TD;
    for(c=pC+1;c<=43;c++) if(m[pR-3][c]===TG) m[pR-3][c]=TD;

    [[10,12],[15,47],[28,10],[33,42],[36,26],[8,28]].forEach(function(cl){
        for(var dr=-2;dr<=2;dr++) for(var dc=-2;dc<=2;dc++){
            var rr=cl[0]+dr,cc=cl[1]+dc;
            if(rr>4&&rr<MR-4&&cc>4&&cc<MC-4&&m[rr][cc]===TG&&rng()<0.6) m[rr][cc]=TR;
        }
    });

    for(i=0;i<65;i++){
        var fr=Math.floor(rng()*(MR-10))+5,fc=Math.floor(rng()*(MC-10))+5;
        if(m[fr][fc]===TG) m[fr][fc]=TF;
    }
    for(i=0;i<20;i++){
        var rr=Math.floor(rng()*(MR-10))+5,rc=Math.floor(rng()*(MC-10))+5;
        if(m[rr][rc]===TG) m[rr][rc]=TO;
    }
    return m;
}

// ── Diamond helpers ────────────────────────────────────────────────────────────
function diamondPath(sx,sy){
    ctx.beginPath();
    ctx.moveTo(sx+HW,sy);
    ctx.lineTo(sx+TW_px,sy+HH);
    ctx.lineTo(sx+HW,sy+TH_px);
    ctx.lineTo(sx,sy+HH);
    ctx.closePath();
}
function fillDiamond(sx,sy,style){
    ctx.fillStyle=style; diamondPath(sx,sy); ctx.fill();
}
function strokeDiamond(sx,sy,col,lw){
    ctx.strokeStyle=col||'rgba(0,0,0,0.22)'; ctx.lineWidth=lw||0.8;
    diamondPath(sx,sy); ctx.stroke();
}

// ── ISO screen position ────────────────────────────────────────────────────────
function tileScreenPos(col,row){
    return {
        sx:Math.round((col-row)*HW-cam.x)+OX,
        sy:Math.round((col+row)*HH-cam.y)+OY
    };
}

// ── Tile drawing ───────────────────────────────────────────────────────────────
function tileGrass(sx,sy){
    var cx=sx+HW,cy=sy+HH;
    var g=ctx.createLinearGradient(cx,sy,cx,sy+TH_px);
    g.addColorStop(0,'#78c85a'); g.addColorStop(0.5,'#5a9e47'); g.addColorStop(1,'#3e7830');
    fillDiamond(sx,sy,g);
    ctx.fillStyle='#3a7228';
    [[-HW*.35,-HH*.55,2,4],[HW*.2,-HH*.35,2,5],[-HW*.1,HH*.1,2,4],[HW*.4,HH*.2,1,3],[-HW*.5,HH*.3,2,3]].forEach(function(b){
        ctx.fillRect(Math.round(cx+b[0]),Math.round(cy+b[1]),b[2],b[3]);
    });
    strokeDiamond(sx,sy,'rgba(42,88,32,0.4)');
}

function tileDark(sx,sy){
    var cx=sx+HW,cy=sy+HH;
    var g=ctx.createLinearGradient(cx,sy,cx,sy+TH_px);
    g.addColorStop(0,'#4a8836'); g.addColorStop(1,'#2c561e');
    fillDiamond(sx,sy,g);
    ctx.fillStyle='#235018';
    [[-HW*.3,-HH*.4,2,4],[HW*.25,-HH*.1,2,5],[HW*.4,HH*.35,2,4],[-HW*.45,HH*.4,1,3]].forEach(function(b){
        ctx.fillRect(Math.round(cx+b[0]),Math.round(cy+b[1]),b[2],b[3]);
    });
    strokeDiamond(sx,sy,'rgba(25,55,18,0.45)');
}

function tileDirt(sx,sy){
    var cx=sx+HW,cy=sy+HH;
    var g=ctx.createLinearGradient(cx,sy,cx,sy+TH_px);
    g.addColorStop(0,'#c09858'); g.addColorStop(1,'#8a6535');
    fillDiamond(sx,sy,g);
    ctx.fillStyle='rgba(80,48,18,0.45)';
    [[-HW*.3,-HH*.2,4,2],[HW*.2,-HH*.4,3,2],[HW*.35,HH*.3,5,2],[-HW*.15,HH*.4,3,2],[-HW*.5,HH*.1,3,2]].forEach(function(p){
        ctx.fillRect(Math.round(cx+p[0]),Math.round(cy+p[1]),p[2],p[3]);
    });
    strokeDiamond(sx,sy,'rgba(100,70,30,0.35)');
}

function tileWater(sx,sy,t){
    var cx=sx+HW,cy=sy+HH;
    var g=ctx.createLinearGradient(cx,sy,cx,sy+TH_px);
    g.addColorStop(0,'#5aaae0'); g.addColorStop(0.5,'#3d80c8'); g.addColorStop(1,'#1e58a0');
    fillDiamond(sx,sy,g);
    var w1=Math.sin(t*1.3+sx*.02)*HH*.35, w2=Math.sin(t*.85+sx*.016+1.8)*HH*.3;
    ctx.fillStyle='rgba(130,200,255,0.28)';
    ctx.fillRect(Math.round(cx-HW*.4),Math.round(cy-HH*.22+w1),Math.round(HW*.8),Math.round(HH*.2));
    ctx.fillStyle='rgba(130,200,255,0.18)';
    ctx.fillRect(Math.round(cx-HW*.25),Math.round(cy+HH*.08+w2),Math.round(HW*.6),Math.round(HH*.16));
    var glint=0.5+Math.sin(t*3.2+sx*.05)*0.5;
    if(glint>0.82){
        ctx.fillStyle='rgba(255,255,255,'+(glint*.4)+')';
        ctx.beginPath(); ctx.arc(cx+HW*.25,cy-HH*.2,1.5,0,Math.PI*2); ctx.fill();
    }
    strokeDiamond(sx,sy,'rgba(100,160,240,0.35)');
}

function tileFlowers(sx,sy,t){
    tileGrass(sx,sy);
    var cx=sx+HW,cy=sy+HH;
    var bob=Math.sin(t*0.85+sx*.12)*1.5;
    var flowers=[
        [-HW*.32,-HH*.4,'#ff96c8','#fff8a0',.12],
        [HW*.18,HH*.2,'#b496ff','#ffff80',.11],
        [HW*.4,-HH*.15,'#ff7744','#ffff90',.10],
        [-HW*.12,HH*.38,'#ffffff','#ffcc44',.09],
        [-HW*.42,HH*.12,'#ffaadd','#ffffff',.10]
    ];
    flowers.forEach(function(f){
        var fx=cx+f[0], fy=cy+f[1]+bob, pr=f[4]*TW_px;
        ctx.fillStyle=f[2];
        for(var p=0;p<5;p++){
            var a=p/5*Math.PI*2;
            ctx.beginPath(); ctx.arc(fx+Math.cos(a)*pr*1.3,fy+Math.sin(a)*pr*.75,pr*.7,0,Math.PI*2); ctx.fill();
        }
        ctx.fillStyle=f[3];
        ctx.beginPath(); ctx.arc(fx,fy,pr*.5,0,Math.PI*2); ctx.fill();
    });
}

function tileStone(sx,sy){
    var cx=sx+HW,cy=sy+HH;
    var g=ctx.createLinearGradient(cx,sy,cx,sy+TH_px);
    g.addColorStop(0,'#9898ac'); g.addColorStop(1,'#6c6c7e');
    fillDiamond(sx,sy,g);
    ctx.strokeStyle='rgba(55,55,68,0.6)'; ctx.lineWidth=1;
    ctx.beginPath();
    ctx.moveTo(sx,sy+HH); ctx.lineTo(sx+TW_px,sy+HH);
    ctx.moveTo(sx+HW,sy); ctx.lineTo(sx+HW,sy+TH_px);
    ctx.stroke();
    ctx.fillStyle='rgba(180,180,205,0.16)';
    ctx.beginPath();
    ctx.moveTo(sx+HW,sy); ctx.lineTo(cx,sy+HH*.5); ctx.lineTo(sx,sy+HH); ctx.closePath();
    ctx.fill();
    strokeDiamond(sx,sy,'rgba(50,50,65,0.45)');
}

function tileFairyRing(sx,sy,t){
    tileStone(sx,sy);
    var cx=sx+HW, cy=sy+HH;
    var pulse=0.5+Math.sin(t*2.2)*0.3;
    ctx.save();
    ctx.shadowColor='#b496ff'; ctx.shadowBlur=22;
    ctx.strokeStyle='rgba(200,160,255,'+(0.5+pulse*.3)+')';
    ctx.lineWidth=3;
    ctx.beginPath(); ctx.ellipse(cx,cy,HW*.72,HH*.72,0,0,Math.PI*2); ctx.stroke();
    ctx.restore();
    ctx.fillStyle='rgba(180,140,255,'+(pulse*.14)+')';
    ctx.beginPath(); ctx.ellipse(cx,cy,HW*.72,HH*.72,0,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='rgba(255,200,255,'+(0.28+pulse*.18)+')'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.ellipse(cx,cy,HW*.46,HH*.46,0,0,Math.PI*2); ctx.stroke();
    for(var i=0;i<9;i++){
        var a=(i/9)*Math.PI*2+t*.55;
        var blink=0.35+Math.sin(t*3+i*1.3)*.4;
        ctx.fillStyle='rgba(255,240,200,'+blink+')';
        ctx.beginPath(); ctx.arc(cx+Math.cos(a)*HW*.72,cy+Math.sin(a)*HH*.72,1.5+blink*1.2,0,Math.PI*2); ctx.fill();
    }
    ctx.fillStyle='rgba(255,220,255,'+(0.6+Math.sin(t*2.5)*.3)+')';
    ctx.beginPath(); ctx.arc(cx,cy,2.8,0,Math.PI*2); ctx.fill();
}

function tileSand(sx,sy){
    var cx=sx+HW;
    var g=ctx.createLinearGradient(cx,sy,cx,sy+TH_px);
    g.addColorStop(0,'#e8cc88'); g.addColorStop(1,'#bfa060');
    fillDiamond(sx,sy,g);
    ctx.strokeStyle='rgba(155,118,55,0.28)'; ctx.lineWidth=0.8;
    for(var i=0;i<3;i++){
        var ry=sy+TH_px*(0.22+i*0.23), hw2=HW*(0.9-i*.15);
        ctx.beginPath(); ctx.moveTo(cx-hw2,ry); ctx.lineTo(cx+hw2,ry); ctx.stroke();
    }
    strokeDiamond(sx,sy,'rgba(160,130,65,0.3)');
}

function tileTree(sx,sy){
    var cx=sx+HW, cy=sy+HH;
    var gd=ctx.createLinearGradient(cx,sy,cx,sy+TH_px);
    gd.addColorStop(0,'#1c4018'); gd.addColorStop(1,'#122c10');
    fillDiamond(sx,sy,gd);
    strokeDiamond(sx,sy,'rgba(12,28,10,0.5)');
    var tkW=Math.max(4,Math.round(TW_px*.1));
    var tkH=Math.round(TH_px*1.5);
    var tkg=ctx.createLinearGradient(cx-tkW,0,cx+tkW,0);
    tkg.addColorStop(0,'#3a1e0c'); tkg.addColorStop(0.45,'#6e4020'); tkg.addColorStop(1,'#3a1e0c');
    ctx.fillStyle=tkg;
    ctx.fillRect(cx-Math.round(tkW/2),cy-tkH,tkW,tkH);
    var top=cy-tkH;
    ctx.fillStyle='#1a3e16';
    ctx.beginPath(); ctx.arc(cx,top,TW_px*.44,0,Math.PI*2); ctx.fill();
    var cg=ctx.createRadialGradient(cx-HW*.15,top-TH_px*.12,0,cx,top,TW_px*.42);
    cg.addColorStop(0,'#62cc50'); cg.addColorStop(0.5,'#3c8c28'); cg.addColorStop(1,'#1c5012');
    ctx.fillStyle=cg;
    ctx.beginPath(); ctx.arc(cx,top,TW_px*.42,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#48a438';
    ctx.beginPath(); ctx.arc(cx-HW*.35,top+TH_px*.05,TW_px*.26,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx+HW*.3,top+TH_px*.08,TW_px*.22,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#74dc58';
    ctx.beginPath(); ctx.arc(cx,top-TH_px*.32,TW_px*.16,0,Math.PI*2); ctx.fill();
}

function tileRock(sx,sy){
    tileGrass(sx,sy);
    var cx=sx+HW, cy=sy+HH;
    ctx.fillStyle='rgba(0,0,0,.25)';
    ctx.beginPath(); ctx.ellipse(cx+HH*.2,cy+HH*.35,HW*.3,HH*.18,0,0,Math.PI*2); ctx.fill();
    var rg=ctx.createRadialGradient(cx-HW*.12,cy-HH*.18,0,cx,cy,HW*.32);
    rg.addColorStop(0,'#9898b0'); rg.addColorStop(0.55,'#6e6e88'); rg.addColorStop(1,'#4c4c60');
    ctx.fillStyle=rg;
    ctx.beginPath(); ctx.ellipse(cx,cy,HW*.32,HH*.35,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(210,210,230,0.32)';
    ctx.beginPath(); ctx.ellipse(cx-HW*.1,cy-HH*.12,HW*.15,HH*.12,-.4,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='rgba(35,35,48,0.32)'; ctx.lineWidth=0.8;
    ctx.beginPath(); ctx.moveTo(cx-HW*.06,cy-HH*.15); ctx.lineTo(cx+HW*.1,cy+HH*.1); ctx.stroke();
}

function drawTile(type,sx,sy,t){
    switch(type){
        case TG: tileGrass(sx,sy); break;
        case TD: tileDirt(sx,sy); break;
        case TW: tileWater(sx,sy,t); break;
        case TF: tileFlowers(sx,sy,t); break;
        case TK: tileDark(sx,sy); break;
        case TS: tileStone(sx,sy); break;
        case TY: tileFairyRing(sx,sy,t); break;
        case TN: tileSand(sx,sy); break;
        case TR: tileTree(sx,sy); break;
        case TO: tileRock(sx,sy); break;
    }
}

// ── Player ─────────────────────────────────────────────────────────────────────
var pl={tc:27,tr:22,wx:0,wy:0,moving:false,dir:'r',flip:false};

function initPlayer(){
    pl.tc=27; pl.tr=22;
    pl.wx=(27-22)*HW; pl.wy=(27+22)*HH;
    pl.moving=false; pl.flip=false;
    cam.x=pl.wx; cam.y=pl.wy;
}

function drawPlayer(t){
    var pcx=Math.round(pl.wx-cam.x)+OX+HW;
    var pcy=Math.round(pl.wy-cam.y)+OY+HH;
    var bob=Math.sin(t*3.2)*2.8, py=pcy+bob;
    ctx.fillStyle='rgba(0,0,0,.24)';
    ctx.beginPath(); ctx.ellipse(pcx,pcy+HH*.25,HW*.28,HH*.22,0,0,Math.PI*2); ctx.fill();
    if(Math.random()<0.45) spawnDust(pcx,py);
    ctx.save();
    if(pl.flip){ ctx.translate(pcx,0); ctx.scale(-1,1); ctx.translate(-pcx,0); }
    var sz=Math.round(HW*1.6);
    ctx.font=sz+'px serif';
    ctx.textAlign='center'; ctx.textBaseline='bottom';
    ctx.shadowColor='#ff96c8'; ctx.shadowBlur=26;
    ctx.fillText('🧚',pcx,py);
    ctx.shadowColor='#b496ff'; ctx.shadowBlur=14;
    ctx.fillText('🧚',pcx,py);
    ctx.shadowBlur=0;
    ctx.restore();
}

// ── Particles — screen space ────────────────────────────────────────────────────
var parts=[];
var DUST_CLR=['#ff96c8','#ffffa0','#b496ff','#96ffdc','#fff'];

function spawnDust(x,y){
    var a=Math.random()*Math.PI*2, spd=10+Math.random()*22;
    parts.push({x:x,y:y,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd-12,life:1,ml:0.45+Math.random()*.4,r:1.2+Math.random()*2.2,c:DUST_CLR[Math.floor(Math.random()*DUST_CLR.length)]});
}

function spawnBurst(x,y){
    for(var i=0;i<16;i++){
        var a=Math.PI*2*i/16+Math.random()*.35, spd=28+Math.random()*75;
        parts.push({x:x,y:y,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd-10,life:1,ml:.55+Math.random()*.5,r:2+Math.random()*3.5,c:DUST_CLR[Math.floor(Math.random()*DUST_CLR.length)]});
    }
}

// ── Fireflies — iso world space ─────────────────────────────────────────────────
var fireflies=[];
var FFY_MAX=28;
var FFY_CLR=['#ffffa0','#c0ffb0','#fff0b0','#e0ffff'];

function updateFireflies(dt,t){
    if(fireflies.length<FFY_MAX){
        var iwx=cam.x+(Math.random()*1.3-.15)*SW;
        var iwy=cam.y+(Math.random()*1.3-.15)*SH;
        var gc=Math.round((iwx/HW+iwy/HH)*.5);
        var gr=Math.round((iwy/HH-iwx/HW)*.5);
        if(gc>=0&&gc<MC&&gr>=0&&gr<MR){
            var tile=map[gr][gc];
            if(tile===TG||tile===TF||tile===TK){
                fireflies.push({
                    iwx:iwx,iwy:iwy,
                    vx:(Math.random()-.5)*20, vy:(Math.random()-.5)*14,
                    phase:Math.random()*Math.PI*2, freq:1.4+Math.random()*2.2,
                    life:1, ml:4+Math.random()*6,
                    r:1.5+Math.random()*1.5,
                    c:FFY_CLR[Math.floor(Math.random()*FFY_CLR.length)]
                });
            }
        }
    }
    for(var i=fireflies.length-1;i>=0;i--){
        var f=fireflies[i];
        f.iwx+=f.vx*dt; f.iwy+=f.vy*dt;
        f.vx+=(Math.random()-.5)*16*dt; f.vy+=(Math.random()-.5)*12*dt;
        f.vx*=0.985; f.vy*=0.985;
        f.life-=dt/f.ml;
        var fsx=f.iwx-cam.x+OX, fsy=f.iwy-cam.y+OY;
        if(f.life<=0||fsx<-120||fsx>SW+120||fsy<-120||fsy>SH+120) fireflies.splice(i,1);
    }
}

function drawFireflies(t){
    for(var i=0;i<fireflies.length;i++){
        var f=fireflies[i];
        var glow=0.28+Math.sin(t*f.freq+f.phase)*.38;
        if(glow<0.04) continue;
        var fsx=Math.round(f.iwx-cam.x)+OX, fsy=Math.round(f.iwy-cam.y)+OY;
        ctx.save();
        ctx.globalAlpha=f.life*Math.max(0,glow);
        ctx.shadowColor=f.c; ctx.shadowBlur=10;
        ctx.fillStyle=f.c;
        ctx.beginPath(); ctx.arc(fsx,fsy,f.r,0,Math.PI*2); ctx.fill();
        ctx.restore();
    }
}

// ── Ambient glow ───────────────────────────────────────────────────────────────
function drawAmbientGlow(t){
    var fr=tileScreenPos(27,20);
    var frSX=fr.sx+HW, frSY=fr.sy+HH;
    var frPulse=0.09+Math.sin(t*1.8)*.035;
    var frG=ctx.createRadialGradient(frSX,frSY,HW*.5,frSX,frSY,HW*6.5);
    frG.addColorStop(0,'rgba(175,130,255,'+frPulse+')');
    frG.addColorStop(1,'rgba(175,130,255,0)');
    ctx.fillStyle=frG; ctx.fillRect(0,0,SW,SH);

    var lk=tileScreenPos(43,8);
    var lkSX=lk.sx+HW, lkSY=lk.sy+HH;
    var lkPulse=0.065+Math.sin(t*.9+1.2)*.022;
    var lkG=ctx.createRadialGradient(lkSX,lkSY,HW,lkSX,lkSY,HW*10);
    lkG.addColorStop(0,'rgba(55,118,210,'+lkPulse+')');
    lkG.addColorStop(1,'rgba(55,118,210,0)');
    ctx.fillStyle=lkG; ctx.fillRect(0,0,SW,SH);
}

// ── Zone names ─────────────────────────────────────────────────────────────────
var ZONES=[
    {r1:4,c1:36,r2:16,c2:52,name:'🌊 The Lake'},
    {r1:17,c1:23,r2:23,c2:31,name:'✨ The Fairy Ring'},
    {r1:0,c1:0,r2:MR,c2:MC,name:'🌿 The Meadow'}
];
var curZone='';
function checkZone(){
    var n='🌿 The Meadow';
    for(var i=0;i<ZONES.length-1;i++){
        var z=ZONES[i];
        if(pl.tr>=z.r1&&pl.tr<z.r2&&pl.tc>=z.c1&&pl.tc<z.c2){n=z.name;break;}
    }
    if(n!==curZone){curZone=n;document.getElementById('zone-name').textContent=n;}
}

// ── Input ──────────────────────────────────────────────────────────────────────
var keys={};
document.addEventListener('keydown',function(e){
    keys[e.key]=true;
    if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) e.preventDefault();
});
document.addEventListener('keyup',function(e){keys[e.key]=false;});
function dp(d,v){ keys['_'+d]=v; }
function inputDir(){
    if(keys['ArrowUp']   ||keys['w']||keys['W']||keys['_u']) return 'u';
    if(keys['ArrowDown'] ||keys['s']||keys['S']||keys['_d']) return 'd';
    if(keys['ArrowLeft'] ||keys['a']||keys['A']||keys['_l']) return 'l';
    if(keys['ArrowRight']||keys['d']||keys['D']||keys['_r']) return 'r';
    return null;
}
var DC={u:[0,-1],d:[0,1],l:[-1,0],r:[1,0]};

// ── Update ─────────────────────────────────────────────────────────────────────
var SPEED=5.0;
function update(dt,t){
    if(pl.moving){
        var twx=(pl.tc-pl.tr)*HW, twy=(pl.tc+pl.tr)*HH;
        var dx=twx-pl.wx, dy=twy-pl.wy;
        var dist=Math.sqrt(dx*dx+dy*dy);
        var step=SPEED*Math.sqrt(HW*HW+HH*HH)*dt;
        if(dist<=step){
            pl.wx=twx; pl.wy=twy; pl.moving=false;
            if(map[pl.tr][pl.tc]===TY){
                var bx=Math.round(pl.wx-cam.x)+OX+HW;
                var by=Math.round(pl.wy-cam.y)+OY+HH;
                spawnBurst(bx,by);
            }
            checkZone();
        } else {
            pl.wx+=dx/dist*step; pl.wy+=dy/dist*step;
        }
    } else {
        var dir=inputDir();
        if(dir){
            var d=DC[dir], nc=pl.tc+d[0], nr=pl.tr+d[1];
            if(nc>=0&&nc<MC&&nr>=0&&nr<MR&&WALK[map[nr][nc]]){
                pl.tc=nc; pl.tr=nr; pl.moving=true;
                pl.dir=dir; pl.flip=(dir==='l'||dir==='d');
            }
        }
    }

    cam.x+=(pl.wx-cam.x)*.11; cam.y+=(pl.wy-cam.y)*.11;

    for(var i=parts.length-1;i>=0;i--){
        var p=parts[i];
        p.x+=p.vx*dt; p.y+=p.vy*dt; p.vy+=58*dt;
        p.life-=dt/p.ml;
        if(p.life<=0) parts.splice(i,1);
    }

    updateFireflies(dt,t);
}

// ── Draw ───────────────────────────────────────────────────────────────────────
function draw(t){
    var bgG=ctx.createLinearGradient(0,0,0,SH);
    bgG.addColorStop(0,'#090522'); bgG.addColorStop(1,'#040210');
    ctx.fillStyle=bgG; ctx.fillRect(0,0,SW,SH);
    if(!started) return;

    // Depth range — vertical screen extent in iso depth units
    var depthMin=Math.max(0,Math.floor((cam.y-OY-TH_px*5)/HH)-1);
    var depthMax=Math.min(MR+MC-2,Math.ceil((cam.y-OY+SH)/HH)+2);

    var plDepth=Math.round(pl.wy/HH);
    var plDrawn=false;

    for(var depth=depthMin;depth<=depthMax;depth++){
        var rFrom=Math.max(0,depth-(MC-1));
        var rTo=Math.min(MR-1,depth);
        for(var dr=rFrom;dr<=rTo;dr++){
            var dc=depth-dr;
            if(dc<0||dc>=MC) continue;
            var sp=tileScreenPos(dc,dr);
            // Cull off-screen (extra vertical buffer for tree canopies)
            if(sp.sx+TW_px<0||sp.sx>SW||sp.sy+TH_px*5<0||sp.sy>SH) continue;
            drawTile(map[dr][dc],sp.sx,sp.sy,t);
        }
        if(!plDrawn&&depth>=plDepth){ drawPlayer(t); plDrawn=true; }
    }
    if(!plDrawn) drawPlayer(t);

    drawAmbientGlow(t);
    drawFireflies(t);

    for(var i=0;i<parts.length;i++){
        var pt=parts[i];
        ctx.globalAlpha=pt.life*.88;
        ctx.fillStyle=pt.c; ctx.shadowColor=pt.c; ctx.shadowBlur=6;
        ctx.beginPath(); ctx.arc(pt.x,pt.y,pt.r,0,Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha=1; ctx.shadowBlur=0;

    var vg=ctx.createRadialGradient(SW/2,SH/2,SH*.2,SW/2,SH/2,SH*.88);
    vg.addColorStop(0,'rgba(0,0,0,0)'); vg.addColorStop(1,'rgba(1,0,7,.65)');
    ctx.fillStyle=vg; ctx.fillRect(0,0,SW,SH);
}

// ── Main loop ──────────────────────────────────────────────────────────────────
var started=false,lastTS=0,gt=0;

function loop(ts){
    var dt=Math.min((ts-lastTS)/1000,.05); lastTS=ts;
    if(started){ gt+=dt; update(dt,gt); }
    draw(gt);
    requestAnimationFrame(loop);
}

function enterPortal(){
    if(started) return;
    document.getElementById('start-screen').style.display='none';
    document.getElementById('ui').style.display='flex';
    if('ontouchstart' in window) document.getElementById('dpad').style.display='block';
    map=buildMap();
    initPlayer();
    checkZone();
    started=true;
}

requestAnimationFrame(loop);
</script>
