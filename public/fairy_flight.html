<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fairy Flight ✦ Pixie Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&family=Pacifico&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:#0a0614; overflow:hidden; font-family:'Quicksand',sans-serif; touch-action:none; user-select:none; -webkit-user-select:none; }
        canvas { display:block; position:relative; z-index:1; }

        #ui { position:fixed; top:0; left:0; right:0; padding:10px 20px; display:flex; justify-content:space-between; align-items:center; z-index:10; background:linear-gradient(180deg,rgba(10,6,20,0.9),transparent); pointer-events:none; display:none; }
        #ui > * { pointer-events:auto; }
        .ui-left, .ui-right { display:flex; align-items:center; gap:15px; }
        .stat { color:#f0d0ff; font-size:14px; font-weight:600; }
        .stat-val { color:#ff96c8; font-size:18px; font-weight:700; }
        .hearts { font-size:20px; letter-spacing:3px; }
        .back-btn { color:#b496ff; text-decoration:none; font-size:13px; cursor:pointer; padding:6px 14px; border:1px solid rgba(180,150,255,0.3); border-radius:20px; }
        .back-btn:hover { border-color:#ff96c8; color:#ff96c8; }

        #start-screen { position:fixed; top:0;left:0;right:0;bottom:0; background:rgba(10,6,20,0.95); z-index:100; display:flex; justify-content:center; align-items:center; flex-direction:column; cursor:pointer; }
        #start-screen h1 { font-family:'Pacifico',cursive; color:#ff96c8; font-size:52px; margin-bottom:10px; text-shadow:0 0 30px rgba(255,150,200,0.4); }
        #start-screen .fairy-bounce { font-size:80px; animation:fairyBounce 1.5s ease-in-out infinite; }
        @keyframes fairyBounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-25px)} }
        #start-screen .tap-text { color:#b496ff; font-size:20px; font-weight:600; margin-top:20px; animation:fadeInOut 2s ease-in-out infinite; }
        @keyframes fadeInOut { 0%,100%{opacity:0.5} 50%{opacity:1} }
        #start-screen .subtitle { color:#9080b0; font-size:14px; margin-top:8px; }

        #game-over { display:none; position:fixed; top:0;left:0;right:0;bottom:0; background:rgba(5,3,10,0.9); z-index:100; justify-content:center; align-items:center; flex-direction:column; }
        #game-over.active { display:flex; }
        #game-over h1 { font-family:'Pacifico',cursive; color:#ff96c8; font-size:48px; margin-bottom:10px; text-shadow:0 0 30px rgba(255,150,200,0.4); }
        #game-over .final-score { font-size:60px; font-weight:700; color:#ffffa0; margin:15px 0; text-shadow:0 0 20px rgba(255,255,160,0.3); }
        #game-over .stats { color:#b496ff; font-size:16px; margin-bottom:25px; line-height:2; text-align:center; }
        #game-over button { padding:12px 30px; border-radius:25px; border:none; background:linear-gradient(135deg,#ff96c8,#b496ff); color:#0a0614; font-family:'Quicksand',sans-serif; font-weight:700; font-size:16px; cursor:pointer; margin:5px; transition:transform 0.2s; }
        #game-over button:hover { transform:scale(1.05); box-shadow:0 5px 25px rgba(255,150,200,0.3); }
        #game-over .ghost-btn { background:transparent; color:#b496ff; border:1px solid rgba(180,150,255,0.3); }
        #game-over .ghost-btn:hover { border-color:#ff96c8; color:#ff96c8; }

        #level-banner { display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); z-index:50; font-family:'Pacifico',cursive; color:#ff96c8; font-size:46px; text-shadow:0 0 40px rgba(255,150,200,0.7); pointer-events:none; text-align:center; white-space:nowrap; }

        #dpad { position:fixed; bottom:50px; right:30px; z-index:20; display:none; width:150px; height:150px; }
        #dpad button { position:absolute; width:50px; height:50px; background:rgba(180,150,255,0.12); border:1px solid rgba(180,150,255,0.25); border-radius:12px; color:#b496ff; font-size:22px; cursor:pointer; display:flex; align-items:center; justify-content:center; -webkit-tap-highlight-color:transparent; }
        #dpad button:active { background:rgba(180,150,255,0.3); }
        #dpad .d-up    { top:0;    left:50px; }
        #dpad .d-down  { top:100px;left:50px; }
        #dpad .d-left  { top:50px; left:0;    }
        #dpad .d-right { top:50px; left:100px;}
    </style>
</head>
<body>
<canvas id="game"></canvas>

<div id="start-screen" onclick="startGame()">
    <h1>Fairy Flight</h1>
    <div class="fairy-bounce">🧚</div>
    <div class="tap-text">Tap to Enter the Maze</div>
    <div class="subtitle">Navigate the enchanted maze, collect gems, find the portal!</div>
    <div style="color:#706080; font-size:13px; margin-top:24px; line-height:2; text-align:center;">
        <span style="color:#b496ff;">ARROWS</span> or <span style="color:#b496ff;">WASD</span> to fly<br>
        Collect all <span style="color:#ff96c8;">💎</span> to unlock the <span style="color:#ffffa0;">✨</span> portal
    </div>
</div>

<div id="ui">
    <div class="ui-left">
        <a class="back-btn" onclick="window.location.href='/'">&#x2190; Portal</a>
        <div class="stat">💎 <span class="stat-val" id="gems">0/0</span></div>
    </div>
    <div class="ui-right">
        <div class="stat">Level <span class="stat-val" id="level-disp">1</span></div>
        <div class="stat">✨ <span class="stat-val" id="score">0</span></div>
        <div class="hearts" id="hearts">💖💖💖</div>
    </div>
</div>

<div id="level-banner"></div>

<div id="game-over">
    <h1>Lost in the Maze</h1>
    <div class="final-score" id="final-score">0</div>
    <div class="stats" id="final-stats"></div>
    <button onclick="startGame()">Play Again ✦</button>
    <button class="ghost-btn" onclick="window.location.href='/'">Back to Portal</button>
</div>

<div id="dpad">
    <button class="d-up"    onpointerdown="dpadSet('up',true)"    onpointerup="dpadSet('up',false)"    onpointercancel="dpadSet('up',false)">▲</button>
    <button class="d-down"  onpointerdown="dpadSet('down',true)"  onpointerup="dpadSet('down',false)"  onpointercancel="dpadSet('down',false)">▼</button>
    <button class="d-left"  onpointerdown="dpadSet('left',true)"  onpointerup="dpadSet('left',false)"  onpointercancel="dpadSet('left',false)">◀</button>
    <button class="d-right" onpointerdown="dpadSet('right',true)" onpointerup="dpadSet('right',false)" onpointercancel="dpadSet('right',false)">▶</button>
</div>

<script>
window.onerror = function(msg, url, line) {
    document.title = 'ERROR: ' + msg + ' (line ' + line + ')';
    var ss = document.getElementById('start-screen');
    if (ss) ss.innerHTML = '<h1 style="color:red;font-size:16px;padding:40px;">ERROR: ' + msg + '<br>Line: ' + line + '</h1>';
    return false;
};

// ── Direction constants ──────────────────────────────────────────────────────
var N = 1, S = 2, E = 4, W = 8;
var OPP  = {}; OPP[N]=S; OPP[S]=N; OPP[E]=W; OPP[W]=E;
var DX   = {}; DX[N]=0;  DX[S]=0;  DX[E]=1;  DX[W]=-1;
var DY   = {}; DY[N]=-1; DY[S]=1;  DY[E]=0;  DY[W]=0;
var DIRS = [N, S, E, W];

// ── Canvas ───────────────────────────────────────────────────────────────────
var canvas = document.getElementById('game');
var ctx    = canvas.getContext('2d');
var W_px = 0, H_px = 0;

function resize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
    W_px = canvas.width;
    H_px = canvas.height;
}
window.addEventListener('resize', function() { resize(); if (gameState === 'playing') layoutMaze(); });
resize();

// ── Game state ───────────────────────────────────────────────────────────────
var gameState = 'start';
var level, score, lives, totalGems, collectedGems;
var maze, mazeC, mazeR, CELL, offX, offY;
var player, gems, shadows, portal;
var frame = 0, lastTime = 0;
var bannerTimer = 0, dyingTimer = 0;
var savedScore = false;
var particles = [];
var bgStars = [];

// ── Input ────────────────────────────────────────────────────────────────────
var keys = {};
document.addEventListener('keydown', function(e) {
    keys[e.key] = true;
    if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) e.preventDefault();
});
document.addEventListener('keyup', function(e) { keys[e.key] = false; });
function dpadSet(dir, val) { keys['pad_' + dir] = val; }

function getDir() {
    if (keys['ArrowUp']    || keys['w'] || keys['W'] || keys['pad_up'])    return N;
    if (keys['ArrowDown']  || keys['s'] || keys['S'] || keys['pad_down'])  return S;
    if (keys['ArrowLeft']  || keys['a'] || keys['A'] || keys['pad_left'])  return W;
    if (keys['ArrowRight'] || keys['d'] || keys['D'] || keys['pad_right']) return E;
    return 0;
}

// ── Maze ─────────────────────────────────────────────────────────────────────
function layoutMaze() {
    CELL = Math.max(28, 46 - level * 2);
    var targetC = 7 + level * 2;
    var targetR = 5 + level * 2;
    mazeC = Math.min(targetC, Math.floor((W_px - 16) / CELL));
    mazeR = Math.min(targetR, Math.floor((H_px - 60) / CELL));
    if (mazeC % 2 === 0) mazeC--;
    if (mazeR % 2 === 0) mazeR--;
    mazeC = Math.max(5, mazeC);
    mazeR = Math.max(5, mazeR);
    offX = Math.floor((W_px - mazeC * CELL) / 2);
    offY = Math.floor(50 + (H_px - 50 - mazeR * CELL) / 2);
}

function generateMaze() {
    maze = [];
    var r, c;
    for (r = 0; r < mazeR; r++) { maze[r] = []; for (c = 0; c < mazeC; c++) maze[r][c] = 0; }
    var visited = [];
    for (r = 0; r < mazeR; r++) { visited[r] = []; for (c = 0; c < mazeC; c++) visited[r][c] = 0; }
    var stack = [{c:0, r:0}];
    visited[0][0] = 1;
    while (stack.length) {
        var cur = stack[stack.length - 1];
        var nbrs = [];
        for (var di = 0; di < DIRS.length; di++) {
            var d = DIRS[di];
            var nc = cur.c + DX[d], nr = cur.r + DY[d];
            if (nc >= 0 && nc < mazeC && nr >= 0 && nr < mazeR && !visited[nr][nc])
                nbrs.push({d:d, nc:nc, nr:nr});
        }
        if (nbrs.length) {
            var pick = nbrs[Math.floor(Math.random() * nbrs.length)];
            maze[cur.r][cur.c] |= pick.d;
            maze[pick.nr][pick.nc] |= OPP[pick.d];
            visited[pick.nr][pick.nc] = 1;
            stack.push({c:pick.nc, r:pick.nr});
        } else { stack.pop(); }
    }
}

function cellCX(c) { return offX + c * CELL + CELL / 2; }
function cellCY(r) { return offY + r * CELL + CELL / 2; }

// ── BFS ───────────────────────────────────────────────────────────────────────
function bfs(fc, fr, tc, tr) {
    if (fc === tc && fr === tr) return [];
    var visited = [], prev = [], r, c;
    for (r = 0; r < mazeR; r++) {
        visited[r] = []; prev[r] = [];
        for (c = 0; c < mazeC; c++) { visited[r][c] = 0; prev[r][c] = null; }
    }
    var q = [[fc, fr]]; visited[fr][fc] = 1;
    while (q.length) {
        var cur = q.shift(); c = cur[0]; r = cur[1];
        if (c === tc && r === tr) {
            var path = [], cc = tc, rr = tr;
            while (cc !== fc || rr !== fr) {
                path.unshift({c:cc, r:rr});
                var p = prev[rr][cc]; cc = p.c; rr = p.r;
            }
            return path;
        }
        for (var di = 0; di < DIRS.length; di++) {
            var d = DIRS[di];
            if (maze[r][c] & d) {
                var nc = c + DX[d], nr = r + DY[d];
                if (!visited[nr][nc]) { visited[nr][nc]=1; prev[nr][nc]={c:c,r:r}; q.push([nc,nr]); }
            }
        }
    }
    return [];
}

// ── Entity placement ──────────────────────────────────────────────────────────
function placeEntities() {
    player = { c:0, r:0, px:cellCX(0), py:cellCY(0), tc:0, tr:0, moving:false, invincible:0 };

    var gemCount = 4 + level * 2;
    var pool = [];
    var r, c;
    for (r = 0; r < mazeR; r++)
        for (c = 0; c < mazeC; c++)
            if (c !== 0 || r !== 0) pool.push({c:c, r:r});
    shuffle(pool);

    gems = pool.slice(0, Math.min(gemCount, pool.length)).map(function(p) {
        return { c:p.c, r:p.r, collected:false, phase:Math.random()*Math.PI*2,
                 type: Math.random() < 0.2 ? 'star' : 'gem' };
    });
    totalGems = gems.length;
    collectedGems = 0;

    portal = { c: mazeC - 1, r: mazeR - 1, open: false, phase: 0 };

    var shadowCount = Math.min(1 + Math.floor((level - 1) / 2), 4);
    var moveInterval = Math.max(10, 38 - level * 4);
    var corners = [
        {c:mazeC-1, r:mazeR-1}, {c:mazeC-1, r:0}, {c:0, r:mazeR-1},
        {c:Math.floor(mazeC/2), r:mazeR-1}
    ];
    shadows = corners.slice(0, shadowCount).map(function(p) {
        return { c:p.c, r:p.r, px:cellCX(p.c), py:cellCY(p.r),
                 tc:p.c, tr:p.r, moving:false, path:[], moveTimer:0, moveInterval:moveInterval, pathTimer:0 };
    });
}

function shuffle(arr) {
    for (var i = arr.length - 1; i > 0; i--) {
        var j = Math.floor(Math.random() * (i + 1));
        var tmp = arr[i]; arr[i] = arr[j]; arr[j] = tmp;
    }
}

// ── Init ──────────────────────────────────────────────────────────────────────
function initBgStars() {
    bgStars = [];
    for (var i = 0; i < 60; i++) {
        bgStars.push({ x: Math.random()*W_px, y: Math.random()*H_px,
            r: Math.random()*1.5+0.3, a: Math.random()*0.5+0.1, phase: Math.random()*Math.PI*2 });
    }
}

function startGame() {
    document.getElementById('start-screen').style.display = 'none';
    document.getElementById('game-over').classList.remove('active');
    document.getElementById('ui').style.display = 'flex';
    if ('ontouchstart' in window) document.getElementById('dpad').style.display = 'block';
    gameState = 'playing';
    level = 1; score = 0; lives = 3; savedScore = false;
    particles = [];
    initBgStars();
    beginLevel();
}

function beginLevel() {
    collectedGems = 0;
    layoutMaze();
    generateMaze();
    placeEntities();
    updateHUD();
}

// ── Update ────────────────────────────────────────────────────────────────────
function update(dt) {
    frame++;

    if (gameState === 'dying') {
        dyingTimer -= dt;
        if (dyingTimer <= 0) {
            if (lives <= 0) { endGame(); return; }
            gameState = 'playing';
            player.c = 0; player.r = 0;
            player.px = cellCX(0); player.py = cellCY(0);
            player.tc = 0; player.tr = 0; player.moving = false;
            player.invincible = 2.5;
        }
        return;
    }

    if (gameState === 'levelup') {
        bannerTimer -= dt;
        if (bannerTimer <= 0) {
            document.getElementById('level-banner').style.display = 'none';
            level++;
            beginLevel();
            gameState = 'playing';
        }
        return;
    }

    if (gameState !== 'playing') return;

    if (player.invincible > 0) player.invincible -= dt;

    // ── Player ──
    var speed = CELL * 4.5;
    if (player.moving) {
        var tx = cellCX(player.tc), ty = cellCY(player.tr);
        var dx = tx - player.px, dy = ty - player.py;
        var dist = Math.sqrt(dx*dx + dy*dy);
        var step = speed * dt;
        if (dist <= step) {
            player.px = tx; player.py = ty;
            player.c = player.tc; player.r = player.tr;
            player.moving = false;
        } else {
            player.px += dx/dist * step;
            player.py += dy/dist * step;
        }
    } else {
        var dir = getDir();
        if (dir && (maze[player.r][player.c] & dir)) {
            player.tc = player.c + DX[dir];
            player.tr = player.r + DY[dir];
            player.moving = true;
        }
    }

    // Trail particle
    if (frame % 3 === 0) spawnParticle(player.px, player.py, '#ff96c8', 0.4, 1.5);

    // ── Portal ──
    portal.phase += dt;
    if (!portal.open && collectedGems >= totalGems) portal.open = true;

    // ── Gems ──
    for (var i = 0; i < gems.length; i++) {
        var g = gems[i];
        if (g.collected) continue;
        g.phase += dt * 2.5;
        if (g.c === player.c && g.r === player.r) {
            g.collected = true; collectedGems++;
            score += g.type === 'star' ? 50 : 10;
            spawnBurst(cellCX(g.c), cellCY(g.r), g.type === 'star' ? '#ffffa0' : '#ff96c8', 10);
            updateHUD();
        }
    }

    // ── Portal exit ──
    if (portal.open && player.c === portal.c && player.r === portal.r) {
        score += level * 100;
        gameState = 'levelup';
        bannerTimer = 1.5;
        var banner = document.getElementById('level-banner');
        banner.textContent = 'Level ' + level + ' Complete! ✦';
        banner.style.display = 'block';
        updateHUD();
        return;
    }

    // ── Shadows ──
    var shadowSpeed = CELL * 3.0;
    for (var si = 0; si < shadows.length; si++) {
        var sh = shadows[si];
        sh.pathTimer += dt;
        if (sh.pathTimer >= 0.6) { sh.pathTimer = 0; sh.path = bfs(sh.c, sh.r, player.c, player.r); }

        if (sh.moving) {
            var tx2 = cellCX(sh.tc), ty2 = cellCY(sh.tr);
            var dx2 = tx2 - sh.px, dy2 = ty2 - sh.py;
            var dist2 = Math.sqrt(dx2*dx2 + dy2*dy2);
            var step2 = shadowSpeed * dt;
            if (dist2 <= step2) {
                sh.px = tx2; sh.py = ty2; sh.c = sh.tc; sh.r = sh.tr; sh.moving = false;
            } else { sh.px += dx2/dist2 * step2; sh.py += dy2/dist2 * step2; }
        } else {
            sh.moveTimer += dt;
            if (sh.moveTimer >= sh.moveInterval / 60) {
                sh.moveTimer = 0;
                if (sh.path.length) { var nx = sh.path.shift(); sh.tc = nx.c; sh.tr = nx.r; sh.moving = true; }
            }
        }

        if (player.invincible <= 0) {
            var ddx = sh.px - player.px, ddy = sh.py - player.py;
            if (Math.sqrt(ddx*ddx + ddy*ddy) < CELL * 0.52) {
                lives--;
                spawnBurst(player.px, player.py, '#ff4466', 14);
                updateHUD();
                gameState = 'dying';
                dyingTimer = 0.8;
                return;
            }
        }
    }

    // ── Particles ──
    for (var pi = particles.length - 1; pi >= 0; pi--) {
        var p = particles[pi];
        p.x += p.vx * dt; p.y += p.vy * dt;
        p.vy += 60 * dt;
        p.life -= dt / p.maxLife;
        if (p.life <= 0) particles.splice(pi, 1);
    }
}

function spawnParticle(x, y, color, maxLife, r) {
    particles.push({ x:x, y:y, vx:(Math.random()-0.5)*40, vy:(Math.random()-0.5)*40,
        life:1, maxLife:maxLife, r:r||2, color:color });
}

function spawnBurst(x, y, color, count) {
    for (var i = 0; i < count; i++) {
        var a = Math.PI*2*i/count, spd = 60 + Math.random()*80;
        particles.push({ x:x, y:y, vx:Math.cos(a)*spd, vy:Math.sin(a)*spd,
            life:1, maxLife:0.6+Math.random()*0.4, r:Math.random()*4+2, color:color });
    }
}

// ── HUD ───────────────────────────────────────────────────────────────────────
function updateHUD() {
    document.getElementById('gems').textContent = collectedGems + '/' + totalGems;
    document.getElementById('score').textContent = score;
    document.getElementById('level-disp').textContent = level;
    var h = '';
    for (var i = 0; i < 3; i++) h += i < lives ? '💖' : '🖤';
    document.getElementById('hearts').textContent = h;
}

// ── End game ──────────────────────────────────────────────────────────────────
function endGame() {
    gameState = 'over';
    document.getElementById('final-score').textContent = score;
    document.getElementById('final-stats').innerHTML =
        'Levels cleared: ' + (level - 1) + '<br>Gems collected: ' + collectedGems;
    document.getElementById('game-over').classList.add('active');
    if (!savedScore) {
        savedScore = true;
        fetch('/api/scores', { method:'POST', headers:{'Content-Type':'application/json'},
            body: JSON.stringify({ game:'fairy_flight', score:score, details:{ level:level, gems:collectedGems } })
        }).catch(function(){});
    }
}

// ── Draw ──────────────────────────────────────────────────────────────────────
function draw(ts) {
    ctx.fillStyle = '#0a0614';
    ctx.fillRect(0, 0, W_px, H_px);

    if (gameState === 'start' || gameState === 'over') return;

    // Stars
    for (var i = 0; i < bgStars.length; i++) {
        var s = bgStars[i];
        var a = s.a * (0.5 + 0.5 * Math.sin(ts * 0.8 + s.phase));
        ctx.fillStyle = 'rgba(200,180,255,' + a + ')';
        ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2); ctx.fill();
    }

    // Maze floor
    ctx.fillStyle = 'rgba(20, 8, 40, 0.65)';
    ctx.fillRect(offX, offY, mazeC * CELL, mazeR * CELL);

    // Portal (behind gems)
    drawPortal(ts);

    // Gems
    for (var i = 0; i < gems.length; i++) {
        var g = gems[i];
        if (g.collected) continue;
        var gx = cellCX(g.c), gy = cellCY(g.r);
        var pulse = 0.7 + 0.3 * Math.sin(g.phase);
        ctx.save();
        ctx.shadowColor = g.type === 'star' ? '#ffffa0' : '#ff96c8';
        ctx.shadowBlur = 12 * pulse;
        ctx.font = Math.round(CELL * 0.55) + 'px serif';
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(g.type === 'star' ? '⭐' : '💎', gx, gy);
        ctx.restore();
    }

    // Maze walls
    ctx.save();
    ctx.strokeStyle = 'rgba(130, 70, 210, 0.85)';
    ctx.lineWidth = 2;
    ctx.shadowColor = '#9060d0'; ctx.shadowBlur = 8;
    ctx.beginPath();
    ctx.rect(offX, offY, mazeC * CELL, mazeR * CELL);
    for (var r = 0; r < mazeR; r++) {
        for (var c = 0; c < mazeC; c++) {
            var x = offX + c * CELL, y = offY + r * CELL;
            if (c < mazeC - 1 && !(maze[r][c] & E)) {
                ctx.moveTo(x + CELL, y); ctx.lineTo(x + CELL, y + CELL);
            }
            if (r < mazeR - 1 && !(maze[r][c] & S)) {
                ctx.moveTo(x, y + CELL); ctx.lineTo(x + CELL, y + CELL);
            }
        }
    }
    ctx.stroke(); ctx.restore();

    // Particles
    ctx.save();
    for (var pi = 0; pi < particles.length; pi++) {
        var p = particles[pi];
        ctx.globalAlpha = p.life;
        ctx.fillStyle = p.color;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha = 1; ctx.restore();

    // Shadows
    for (var si = 0; si < shadows.length; si++) drawShadow(shadows[si], ts);

    // Fairy
    drawFairy(ts);
}

function drawPortal(ts) {
    var px = cellCX(portal.c), py = cellCY(portal.r);
    var pulse = 0.6 + 0.4 * Math.sin(portal.phase * 3);

    if (!portal.open) {
        // Locked: dim grey glow
        ctx.save();
        ctx.globalAlpha = 0.35;
        ctx.shadowColor = '#9080b0'; ctx.shadowBlur = 8;
        ctx.font = Math.round(CELL * 0.6) + 'px serif';
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillStyle = '#9080b0';
        ctx.fillText('🔒', px, py);
        ctx.restore();
        return;
    }

    // Open: glowing portal
    ctx.save();
    ctx.shadowColor = '#ffffa0'; ctx.shadowBlur = 30 * pulse;
    var grad = ctx.createRadialGradient(px, py, 0, px, py, CELL * 0.55);
    grad.addColorStop(0, 'rgba(255,255,160,' + (0.4 * pulse) + ')');
    grad.addColorStop(1, 'rgba(255,255,160,0)');
    ctx.fillStyle = grad;
    ctx.beginPath(); ctx.arc(px, py, CELL * 0.55, 0, Math.PI*2); ctx.fill();

    ctx.font = Math.round(CELL * 0.65) + 'px serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('✨', px, py);
    ctx.restore();
}

function drawFairy(ts) {
    var flicker = player.invincible > 0 && Math.floor(player.invincible * 8) % 2 === 0;
    if (flicker) return;

    var t = ts * 0.001;
    ctx.save();
    ctx.shadowColor = '#ff96c8'; ctx.shadowBlur = 18;

    // Outer glow
    var grad = ctx.createRadialGradient(player.px, player.py, 0, player.px, player.py, CELL * 0.38);
    grad.addColorStop(0, 'rgba(255,150,200,0.35)');
    grad.addColorStop(1, 'rgba(255,150,200,0)');
    ctx.fillStyle = grad;
    ctx.beginPath(); ctx.arc(player.px, player.py, CELL * 0.38, 0, Math.PI*2); ctx.fill();

    ctx.font = Math.round(CELL * 0.7) + 'px serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('🧚', player.px, player.py);
    ctx.restore();
}

function drawShadow(sh, ts) {
    var t = ts * 0.001;
    ctx.save();
    ctx.shadowColor = 'rgba(80,0,120,0.9)'; ctx.shadowBlur = 18;

    var grad = ctx.createRadialGradient(sh.px, sh.py, 0, sh.px, sh.py, CELL * 0.42);
    grad.addColorStop(0, 'rgba(60,0,100,0.95)');
    grad.addColorStop(0.5, 'rgba(30,0,60,0.7)');
    grad.addColorStop(1, 'rgba(10,0,30,0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.ellipse(sh.px, sh.py, CELL*0.38 + Math.sin(t*3)*3, CELL*0.32 + Math.cos(t*2.5)*3, t*0.5, 0, Math.PI*2);
    ctx.fill();

    var eyeOff = CELL * 0.1;
    ctx.fillStyle = 'rgba(200,80,255,0.9)';
    ctx.shadowColor = '#c050ff'; ctx.shadowBlur = 10;
    ctx.beginPath();
    ctx.arc(sh.px - eyeOff, sh.py - 2, 3, 0, Math.PI*2);
    ctx.arc(sh.px + eyeOff, sh.py - 2, 3, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
}

// ── Loop ──────────────────────────────────────────────────────────────────────
function loop(ts) {
    var dt = lastTime ? Math.min((ts - lastTime) / 1000, 0.05) : 0;
    lastTime = ts;
    update(dt);
    draw(ts);
    requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
