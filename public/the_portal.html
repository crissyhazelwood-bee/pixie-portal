<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>The Portal ✦ Pixie Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&family=Pacifico&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:#060410; overflow:hidden; font-family:'Quicksand',sans-serif; touch-action:none; user-select:none; -webkit-user-select:none; }
        canvas { display:block; }

        #start-screen {
            position:fixed; inset:0; z-index:100;
            display:flex; flex-direction:column; justify-content:center; align-items:center;
            cursor:pointer;
            background: radial-gradient(ellipse at center, rgba(30,10,60,0.98) 0%, rgba(5,2,12,0.99) 100%);
        }
        #start-screen h1 {
            font-family:'Pacifico',cursive; font-size:54px;
            background:linear-gradient(135deg,#ff96c8,#b496ff,#96ffdc,#ff96c8);
            background-size:300% 300%; -webkit-background-clip:text; background-clip:text;
            -webkit-text-fill-color:transparent; animation:gradShift 5s ease infinite;
            margin-bottom:6px; padding:0 10px;
        }
        @keyframes gradShift { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }
        .portal-orb { font-size:90px; margin:14px 0; animation:orbPulse 4s ease-in-out infinite; filter:drop-shadow(0 0 40px rgba(180,150,255,0.7)); }
        @keyframes orbPulse { 0%,100%{transform:scale(1) rotate(0deg)} 50%{transform:scale(1.08) rotate(5deg)} }
        .step-text { color:#b496ff; font-size:21px; font-weight:600; margin-top:16px; animation:blink 2s ease-in-out infinite; letter-spacing:2px; }
        @keyframes blink { 0%,100%{opacity:0.35} 50%{opacity:1} }
        .start-hint { color:#504060; font-size:13px; margin-top:12px; letter-spacing:1px; }

        #ui {
            position:fixed; top:0; left:0; right:0; padding:10px 20px;
            display:none; justify-content:space-between; align-items:center;
            z-index:10; pointer-events:none;
            background:linear-gradient(180deg,rgba(6,4,16,0.88) 0%,transparent 100%);
        }
        #ui > * { pointer-events:auto; }
        .back-btn { color:#b496ff; font-size:13px; cursor:pointer; padding:6px 14px; border:1px solid rgba(180,150,255,0.3); border-radius:20px; }
        .back-btn:hover { border-color:#ff96c8; color:#ff96c8; }
        #zone-name { color:#f0d0ff; font-size:14px; font-weight:600; letter-spacing:1px; }

        /* UI action buttons */
        .ui-btn-row { display:flex; gap:8px; }
        .ui-btn {
            font-family:'Quicksand',sans-serif; font-size:12px; font-weight:700;
            cursor:pointer; padding:6px 13px; border-radius:20px;
            background:transparent; letter-spacing:0.4px; transition:all 0.18s;
        }
        .ui-btn-fairy { color:#ff96c8; border:1px solid rgba(255,150,200,0.35); }
        .ui-btn-fairy:hover { border-color:#ff96c8; background:rgba(255,150,200,0.1); }
        .ui-btn-build { color:#96ffdc; border:1px solid rgba(150,255,220,0.3); }
        .ui-btn-build:hover { border-color:#96ffdc; background:rgba(150,255,220,0.1); }
        .ui-btn-build.active { background:#96ffdc; color:#060410; border-color:#96ffdc; }

        #dpad { position:fixed; bottom:36px; right:22px; z-index:20; display:none; width:132px; height:132px; }
        #dpad button {
            position:absolute; width:44px; height:44px;
            background:rgba(180,150,255,0.14); border:1px solid rgba(180,150,255,0.28);
            border-radius:12px; color:#b496ff; font-size:18px; cursor:pointer;
            display:flex; align-items:center; justify-content:center;
            -webkit-tap-highlight-color:transparent;
        }
        #dpad button:active { background:rgba(180,150,255,0.32); }
        #dpad .d-up    { top:0;    left:44px; }
        #dpad .d-down  { top:88px; left:44px; }
        #dpad .d-left  { top:44px; left:0; }
        #dpad .d-right { top:44px; left:88px; }

        /* Modal base */
        .modal-bg {
            display:none; position:fixed; inset:0; z-index:200;
            background:rgba(5,2,12,0.9); backdrop-filter:blur(5px);
            justify-content:center; align-items:center;
        }
        .modal-bg.open { display:flex; }
        .modal-card {
            background:linear-gradient(135deg,#1a1030,#0d0820);
            border:1px solid rgba(180,150,255,0.22); border-radius:22px;
            padding:28px 26px; width:440px; max-width:94vw; max-height:88vh; overflow-y:auto;
        }
        .modal-card h3 { font-family:'Pacifico',cursive; color:#ff96c8; font-size:22px; margin-bottom:20px; }
        .form-label { color:#b496ff; font-size:11px; font-weight:700; letter-spacing:1.2px; margin-bottom:8px; display:block; }
        .form-section { margin-bottom:18px; }
        .text-input {
            width:100%; padding:10px 14px; border-radius:12px;
            border:1px solid rgba(180,150,255,0.22); background:rgba(20,12,40,0.85);
            color:#f0d0ff; font-family:'Quicksand',sans-serif; font-size:14px;
        }
        .text-input:focus { outline:none; border-color:#b496ff; }
        .swatch-row { display:flex; flex-wrap:wrap; gap:8px; }
        .sw {
            border-radius:50%; cursor:pointer; transition:transform 0.15s, box-shadow 0.15s;
            width:30px; height:30px; border:2px solid rgba(255,255,255,0.08);
        }
        .sw:hover { transform:scale(1.15); }
        .sw.on { box-shadow:0 0 0 3px rgba(255,255,255,0.7); }
        .sw-emoji {
            width:46px; height:46px; border-radius:12px; font-size:26px;
            display:flex; align-items:center; justify-content:center;
            background:rgba(180,150,255,0.08); border:2px solid rgba(180,150,255,0.15);
            cursor:pointer; transition:all 0.15s;
        }
        .sw-emoji:hover { background:rgba(180,150,255,0.18); }
        .sw-emoji.on { border-color:#ff96c8; background:rgba(255,150,200,0.15); box-shadow:0 0 0 1px #ff96c8; }
        .wing-opt {
            padding:7px 14px; border-radius:14px; cursor:pointer; font-size:12px; font-weight:600;
            border:1px solid rgba(180,150,255,0.18); color:#806090; background:rgba(20,12,40,0.7);
            transition:all 0.15s;
        }
        .wing-opt:hover { border-color:#b496ff; color:#b496ff; }
        .wing-opt.on { border-color:#ff96c8; color:#ff96c8; background:rgba(255,150,200,0.12); }
        .modal-btns { display:flex; gap:10px; margin-top:22px; }
        .btn-save {
            flex:1; padding:11px; border-radius:12px; border:none; cursor:pointer;
            font-family:'Quicksand',sans-serif; font-weight:700; font-size:14px;
            background:linear-gradient(135deg,#ff96c8,#b496ff); color:#0a0614;
        }
        .btn-cancel {
            flex:1; padding:11px; border-radius:12px; cursor:pointer;
            font-family:'Quicksand',sans-serif; font-weight:700; font-size:14px;
            border:1px solid rgba(180,150,255,0.28); background:transparent; color:#b496ff;
        }

        /* Build panel */
        #build-panel {
            position:fixed; bottom:0; left:0; right:0; z-index:30;
            background:rgba(6,4,22,0.97); border-top:1px solid rgba(180,150,255,0.18);
            padding:12px 16px 26px; transform:translateY(100%);
            transition:transform 0.32s cubic-bezier(.4,0,.2,1);
        }
        #build-panel.open { transform:translateY(0); }
        .bp-header { display:flex; align-items:center; gap:8px; margin-bottom:12px; flex-wrap:wrap; }
        .bp-tab {
            padding:5px 13px; border-radius:16px; font-size:12px; font-weight:700;
            cursor:pointer; border:1px solid rgba(180,150,255,0.2); color:#604870;
            letter-spacing:0.4px; transition:all 0.15s; background:transparent;
            font-family:'Quicksand',sans-serif;
        }
        .bp-tab.active { border-color:#b496ff; color:#b496ff; background:rgba(180,150,255,0.12); }
        .bp-erase {
            margin-left:auto; padding:5px 13px; border-radius:16px; font-size:12px; font-weight:700;
            cursor:pointer; border:1px solid rgba(255,100,100,0.25); color:#a06060;
            background:transparent; transition:all 0.15s; font-family:'Quicksand',sans-serif;
        }
        .bp-erase.active { border-color:#ff8888; color:#ff8888; background:rgba(255,100,100,0.15); }
        .palette { display:flex; gap:10px; flex-wrap:wrap; max-height:130px; overflow-y:auto; padding-bottom:2px; }
        .pi {
            width:54px; height:54px; border-radius:14px; cursor:pointer; flex-shrink:0;
            border:2px solid rgba(180,150,255,0.15); background:rgba(20,12,45,0.75);
            display:flex; flex-direction:column; align-items:center; justify-content:center;
            font-size:22px; transition:all 0.15s;
        }
        .pi:hover { border-color:#b496ff; background:rgba(180,150,255,0.12); transform:scale(1.06); }
        .pi.active { border-color:#ff96c8; background:rgba(255,150,200,0.15); }
        .pi span { font-size:9px; color:#806090; margin-top:2px; line-height:1; text-align:center; }
        .bp-hint { color:#3a2848; font-size:11px; text-align:center; margin-top:10px; letter-spacing:0.3px; }

        /* Build cursor indicator */
        #build-cursor {
            display:none; position:fixed; pointer-events:none; z-index:25;
            font-size:28px; transform:translate(-50%,-100%); opacity:0.75;
            filter:drop-shadow(0 0 8px rgba(255,150,200,0.8));
        }
    </style>
</head>
<body>
<canvas id="c"></canvas>

<div id="start-screen" onclick="enterPortal()">
    <h1>~ The Portal ~</h1>
    <div class="portal-orb">🌀</div>
    <div class="step-text">Step Through</div>
    <div class="start-hint">Arrow keys · WASD · or D-Pad</div>
</div>

<div id="ui">
    <a class="back-btn" onclick="window.location.href='/'">&#x2190; Portal</a>
    <div id="zone-name">The Meadow</div>
    <div class="ui-btn-row">
        <button class="ui-btn ui-btn-fairy" onclick="openCustomizer()">&#x2728; Fairy</button>
        <button id="build-btn" class="ui-btn ui-btn-build" onclick="toggleBuild()">&#x1F528; Build</button>
    </div>
</div>

<div id="dpad">
    <button class="d-up"    onpointerdown="dp('u',1)" onpointerup="dp('u',0)" onpointercancel="dp('u',0)">&#x25B2;</button>
    <button class="d-down"  onpointerdown="dp('d',1)" onpointerup="dp('d',0)" onpointercancel="dp('d',0)">&#x25BC;</button>
    <button class="d-left"  onpointerdown="dp('l',1)" onpointerup="dp('l',0)" onpointercancel="dp('l',0)">&#x25C0;</button>
    <button class="d-right" onpointerdown="dp('r',1)" onpointerup="dp('r',0)" onpointercancel="dp('r',0)">&#x25B6;</button>
</div>

<!-- Floating cursor emoji for build mode -->
<div id="build-cursor"></div>

<!-- ════════════ FAIRY CUSTOMIZER MODAL ════════════ -->
<div id="cust-modal" class="modal-bg">
    <div class="modal-card">
        <h3>&#x2728; Your Fairy</h3>

        <div class="form-section">
            <label class="form-label">FAIRY NAME</label>
            <input id="fairy-name-input" class="text-input" type="text" maxlength="20" placeholder="Name your fairy...">
        </div>

        <div class="form-section">
            <label class="form-label">FAIRY TYPE</label>
            <div class="swatch-row" id="gender-row">
                <div class="sw-emoji on" data-gender="" onclick="selectGender(this)">&#x1F9DA;</div>
                <div class="sw-emoji" data-gender="&#x200D;&#x2640;&#xFE0F;" onclick="selectGender(this)">&#x1F9DA;&#x200D;&#x2640;&#xFE0F;</div>
                <div class="sw-emoji" data-gender="&#x200D;&#x2642;&#xFE0F;" onclick="selectGender(this)">&#x1F9DA;&#x200D;&#x2642;&#xFE0F;</div>
            </div>
        </div>

        <div class="form-section">
            <label class="form-label">SKIN TONE</label>
            <div class="swatch-row" id="skin-row">
                <div class="sw on"  style="background:linear-gradient(135deg,#ffd9a0,#ffb870)" data-skin=""        onclick="selectSkin(this)" title="Default"></div>
                <div class="sw"     style="background:linear-gradient(135deg,#fde7c8,#f5c992)" data-skin="&#x1F3FB;" onclick="selectSkin(this)" title="Light"></div>
                <div class="sw"     style="background:linear-gradient(135deg,#eabd8a,#d49c5a)" data-skin="&#x1F3FC;" onclick="selectSkin(this)" title="Medium-Light"></div>
                <div class="sw"     style="background:linear-gradient(135deg,#c68642,#a5632a)" data-skin="&#x1F3FD;" onclick="selectSkin(this)" title="Medium"></div>
                <div class="sw"     style="background:linear-gradient(135deg,#8d5524,#6b3d16)" data-skin="&#x1F3FE;" onclick="selectSkin(this)" title="Medium-Dark"></div>
                <div class="sw"     style="background:linear-gradient(135deg,#4a2912,#2e160a)" data-skin="&#x1F3FF;" onclick="selectSkin(this)" title="Dark"></div>
            </div>
        </div>

        <div class="form-section">
            <label class="form-label">WING STYLE</label>
            <div class="swatch-row" id="wing-row">
                <div class="wing-opt on" data-wing="butterfly" onclick="selectWing(this)">&#x1F98B; Butterfly</div>
                <div class="wing-opt"    data-wing="dragonfly" onclick="selectWing(this)">&#x2728; Dragonfly</div>
                <div class="wing-opt"    data-wing="petal"     onclick="selectWing(this)">&#x1F338; Petal</div>
                <div class="wing-opt"    data-wing="sparkle"   onclick="selectWing(this)">&#x2B50; Sparkle</div>
            </div>
        </div>

        <div class="form-section">
            <label class="form-label">GLOW COLOR</label>
            <div class="swatch-row" id="glow-row">
                <div class="sw on" style="background:#ff96c8" data-glow="#ff96c8" onclick="selectGlow(this)"></div>
                <div class="sw"    style="background:#b496ff" data-glow="#b496ff" onclick="selectGlow(this)"></div>
                <div class="sw"    style="background:#96ffdc" data-glow="#96ffdc" onclick="selectGlow(this)"></div>
                <div class="sw"    style="background:#96c8ff" data-glow="#96c8ff" onclick="selectGlow(this)"></div>
                <div class="sw"    style="background:#ffd700" data-glow="#ffd700" onclick="selectGlow(this)"></div>
                <div class="sw"    style="background:#ff7744" data-glow="#ff7744" onclick="selectGlow(this)"></div>
                <div class="sw"    style="background:#ffffff" data-glow="#ffffff" onclick="selectGlow(this)"></div>
            </div>
        </div>

        <div class="modal-btns">
            <button class="btn-save" onclick="saveFairyAndClose()">Save &#x2728;</button>
            <button class="btn-cancel" onclick="closeCustomizer()">Cancel</button>
        </div>
    </div>
</div>

<!-- ════════════ BUILD PANEL ════════════ -->
<div id="build-panel">
    <div class="bp-header">
        <button class="bp-tab active" onclick="setBuildTab('buildings',this)">&#x1F3E1; Buildings</button>
        <button class="bp-tab"        onclick="setBuildTab('gardens',this)">&#x1F338; Gardens</button>
        <button class="bp-tab"        onclick="setBuildTab('decor',this)">&#x1F3EE; Decor</button>
        <button id="erase-btn" class="bp-erase" onclick="toggleErase()">&#x1F5D1; Erase</button>
    </div>
    <div class="palette" id="palette-grid"></div>
    <div class="bp-hint" id="build-hint">Select an item then click the world to place it &mdash; right-click to erase</div>
</div>

<!-- Bug report -->
<div style="position:fixed;bottom:18px;left:50%;transform:translateX(-50%);z-index:9999;">
    <button onclick="document.getElementById('bm').style.display='flex'" style="background:rgba(6,4,16,0.75);border:1px solid rgba(180,150,255,0.22);color:#604878;font-family:'Quicksand',sans-serif;font-size:12px;padding:6px 16px;border-radius:20px;cursor:pointer;backdrop-filter:blur(6px);">&#x1F41B; report a bug</button>
</div>
<div id="bm" style="display:none;position:fixed;inset:0;background:rgba(5,2,12,0.88);z-index:10000;justify-content:center;align-items:center;backdrop-filter:blur(4px);">
    <div style="background:linear-gradient(135deg,#1a1030,#0d0820);border:1px solid rgba(180,150,255,0.2);border-radius:20px;padding:32px;width:380px;max-width:92vw;">
        <h3 style="font-family:'Pacifico',cursive;color:#ff96c8;margin-bottom:12px;">Report a Bug</h3>
        <textarea id="bd" placeholder="What went wrong?" style="width:100%;padding:12px;border-radius:10px;border:1px solid rgba(180,150,255,0.2);background:rgba(20,12,35,0.8);color:#f0d0ff;font-family:'Quicksand',sans-serif;font-size:14px;resize:vertical;min-height:100px;margin-bottom:14px;"></textarea>
        <div style="display:flex;gap:10px;">
            <button onclick="(function(){var d=document.getElementById('bd').value.trim();if(!d)return;window.location.href='mailto:crissy@pixieportalgames.com?subject=Pixie+Portal+Bug+Report&body='+encodeURIComponent('Page: '+window.location.pathname+'\n\n'+d);document.getElementById('bm').style.display='none';document.getElementById('bd').value='';})()" style="flex:1;padding:10px;border-radius:12px;border:none;background:linear-gradient(135deg,#ff96c8,#b496ff);color:#0a0614;font-family:'Quicksand',sans-serif;font-weight:700;cursor:pointer;">Send &#x1F41B;</button>
            <button onclick="document.getElementById('bm').style.display='none'" style="flex:1;padding:10px;border-radius:12px;border:1px solid rgba(180,150,255,0.3);background:transparent;color:#b496ff;font-family:'Quicksand',sans-serif;font-weight:700;cursor:pointer;">Cancel</button>
        </div>
    </div>
</div>

<script>
window.onerror = function(m,u,l){ document.body.innerHTML='<div style="color:#ff96c8;padding:40px;font-size:15px;">ERROR: '+m+'<br>Line '+l+'</div>'; };

// ── Tile IDs ───────────────────────────────────────────────────────────────────
var TG=0,TD=1,TW=2,TF=3,TK=4,TS=5,TY=6,TN=7,TR=8,TO=9;
var WALK=[1,1,0,1,1,1,1,1,0,0];

// ── Canvas ─────────────────────────────────────────────────────────────────────
var canvas=document.getElementById('c'), ctx=canvas.getContext('2d');
var SW,SH,TW_px,TH_px,HW,HH,OX,OY;
var cam={x:0,y:0};

function resize(){
    canvas.width=window.innerWidth; canvas.height=window.innerHeight;
    SW=canvas.width; SH=canvas.height;
    TW_px=Math.floor(Math.min(80,Math.max(48,Math.min(SW,SH)/10))/2)*2;
    TH_px=TW_px>>1; HW=TW_px>>1; HH=TH_px>>1;
    OX=(SW>>1)-HW; OY=(SH>>1)-HH;
}
window.addEventListener('resize',resize); resize();

// ── Seeded RNG ─────────────────────────────────────────────────────────────────
function mkRng(seed){
    var s=seed;
    return function(){ s=(s*16807)%2147483647; return (s-1)/2147483646; };
}

// ── Map ────────────────────────────────────────────────────────────────────────
var MR=40,MC=55,map;

function buildMap(){
    var rng=mkRng(1337),r,c,i,m=[];
    for(r=0;r<MR;r++){m[r]=[];for(c=0;c<MC;c++)m[r][c]=TG;}

    for(r=0;r<MR;r++) for(c=0;c<MC;c++){
        if(r<2||r>=MR-2||c<2||c>=MC-2) m[r][c]=TR;
        else if(r<4||r>=MR-4||c<4||c>=MC-4) m[r][c]=TK;
    }

    var lR=8,lC=43,lA=4.2,lB=5.5;
    for(r=3;r<MR-3;r++) for(c=3;c<MC-3;c++){
        var d=((r-lR)/lA)*((r-lR)/lA)+((c-lC)/lB)*((c-lC)/lB);
        if(d<1.0) m[r][c]=TW;
        else if(d<1.4&&(m[r][c]===TG||m[r][c]===TK)) m[r][c]=TN;
    }

    var pR=20,pC=27;
    for(c=4;c<MC-4;c++) if(m[pR][c]!==TW&&m[pR][c]!==TR) m[pR][c]=TS;
    for(r=4;r<MR-4;r++) if(m[r][pC]!==TW&&m[r][pC]!==TR) m[r][pC]=TS;
    m[pR][pC]=TY;

    for(r=14;r<pR;r++) if(m[r][43]===TG||m[r][43]===TK) m[r][43]=TD;
    for(c=pC+1;c<=43;c++) if(m[pR-3][c]===TG) m[pR-3][c]=TD;

    [[10,12],[15,47],[28,10],[33,42],[36,26],[8,28]].forEach(function(cl){
        for(var dr=-2;dr<=2;dr++) for(var dc=-2;dc<=2;dc++){
            var rr=cl[0]+dr,cc=cl[1]+dc;
            if(rr>4&&rr<MR-4&&cc>4&&cc<MC-4&&m[rr][cc]===TG&&rng()<0.6) m[rr][cc]=TR;
        }
    });

    for(i=0;i<65;i++){
        var fr=Math.floor(rng()*(MR-10))+5,fc=Math.floor(rng()*(MC-10))+5;
        if(m[fr][fc]===TG) m[fr][fc]=TF;
    }
    for(i=0;i<20;i++){
        var rr=Math.floor(rng()*(MR-10))+5,rc=Math.floor(rng()*(MC-10))+5;
        if(m[rr][rc]===TG) m[rr][rc]=TO;
    }
    return m;
}

// ── Diamond helpers ────────────────────────────────────────────────────────────
function diamondPath(sx,sy){
    ctx.beginPath();
    ctx.moveTo(sx+HW,sy);
    ctx.lineTo(sx+TW_px,sy+HH);
    ctx.lineTo(sx+HW,sy+TH_px);
    ctx.lineTo(sx,sy+HH);
    ctx.closePath();
}
function fillDiamond(sx,sy,style){
    ctx.fillStyle=style; diamondPath(sx,sy); ctx.fill();
}
function strokeDiamond(sx,sy,col,lw){
    ctx.strokeStyle=col||'rgba(0,0,0,0.22)'; ctx.lineWidth=lw||0.8;
    diamondPath(sx,sy); ctx.stroke();
}

// ── ISO screen position ────────────────────────────────────────────────────────
function tileScreenPos(col,row){
    return {
        sx:Math.round((col-row)*HW-cam.x)+OX,
        sy:Math.round((col+row)*HH-cam.y)+OY
    };
}

// ── Tile drawing ───────────────────────────────────────────────────────────────
function tileGrass(sx,sy){
    var cx=sx+HW,cy=sy+HH;
    var g=ctx.createLinearGradient(cx,sy,cx,sy+TH_px);
    g.addColorStop(0,'#78c85a'); g.addColorStop(0.5,'#5a9e47'); g.addColorStop(1,'#3e7830');
    fillDiamond(sx,sy,g);
    ctx.fillStyle='#3a7228';
    [[-HW*.35,-HH*.55,2,4],[HW*.2,-HH*.35,2,5],[-HW*.1,HH*.1,2,4],[HW*.4,HH*.2,1,3],[-HW*.5,HH*.3,2,3]].forEach(function(b){
        ctx.fillRect(Math.round(cx+b[0]),Math.round(cy+b[1]),b[2],b[3]);
    });
    strokeDiamond(sx,sy,'rgba(42,88,32,0.4)');
}

function tileDark(sx,sy){
    var cx=sx+HW,cy=sy+HH;
    var g=ctx.createLinearGradient(cx,sy,cx,sy+TH_px);
    g.addColorStop(0,'#4a8836'); g.addColorStop(1,'#2c561e');
    fillDiamond(sx,sy,g);
    ctx.fillStyle='#235018';
    [[-HW*.3,-HH*.4,2,4],[HW*.25,-HH*.1,2,5],[HW*.4,HH*.35,2,4],[-HW*.45,HH*.4,1,3]].forEach(function(b){
        ctx.fillRect(Math.round(cx+b[0]),Math.round(cy+b[1]),b[2],b[3]);
    });
    strokeDiamond(sx,sy,'rgba(25,55,18,0.45)');
}

function tileDirt(sx,sy){
    var cx=sx+HW,cy=sy+HH;
    var g=ctx.createLinearGradient(cx,sy,cx,sy+TH_px);
    g.addColorStop(0,'#c09858'); g.addColorStop(1,'#8a6535');
    fillDiamond(sx,sy,g);
    ctx.fillStyle='rgba(80,48,18,0.45)';
    [[-HW*.3,-HH*.2,4,2],[HW*.2,-HH*.4,3,2],[HW*.35,HH*.3,5,2],[-HW*.15,HH*.4,3,2],[-HW*.5,HH*.1,3,2]].forEach(function(p){
        ctx.fillRect(Math.round(cx+p[0]),Math.round(cy+p[1]),p[2],p[3]);
    });
    strokeDiamond(sx,sy,'rgba(100,70,30,0.35)');
}

function tileWater(sx,sy,t){
    var cx=sx+HW,cy=sy+HH;
    var g=ctx.createLinearGradient(cx,sy,cx,sy+TH_px);
    g.addColorStop(0,'#5aaae0'); g.addColorStop(0.5,'#3d80c8'); g.addColorStop(1,'#1e58a0');
    fillDiamond(sx,sy,g);
    var w1=Math.sin(t*1.3+sx*.02)*HH*.35, w2=Math.sin(t*.85+sx*.016+1.8)*HH*.3;
    ctx.fillStyle='rgba(130,200,255,0.28)';
    ctx.fillRect(Math.round(cx-HW*.4),Math.round(cy-HH*.22+w1),Math.round(HW*.8),Math.round(HH*.2));
    ctx.fillStyle='rgba(130,200,255,0.18)';
    ctx.fillRect(Math.round(cx-HW*.25),Math.round(cy+HH*.08+w2),Math.round(HW*.6),Math.round(HH*.16));
    var glint=0.5+Math.sin(t*3.2+sx*.05)*0.5;
    if(glint>0.82){
        ctx.fillStyle='rgba(255,255,255,'+(glint*.4)+')';
        ctx.beginPath(); ctx.arc(cx+HW*.25,cy-HH*.2,1.5,0,Math.PI*2); ctx.fill();
    }
    strokeDiamond(sx,sy,'rgba(100,160,240,0.35)');
}

function tileFlowers(sx,sy,t){
    tileGrass(sx,sy);
    var cx=sx+HW,cy=sy+HH;
    var bob=Math.sin(t*0.85+sx*.12)*1.5;
    var flowers=[
        [-HW*.32,-HH*.4,'#ff96c8','#fff8a0',.12],
        [HW*.18,HH*.2,'#b496ff','#ffff80',.11],
        [HW*.4,-HH*.15,'#ff7744','#ffff90',.10],
        [-HW*.12,HH*.38,'#ffffff','#ffcc44',.09],
        [-HW*.42,HH*.12,'#ffaadd','#ffffff',.10]
    ];
    flowers.forEach(function(f){
        var fx=cx+f[0], fy=cy+f[1]+bob, pr=f[4]*TW_px;
        ctx.fillStyle=f[2];
        for(var p=0;p<5;p++){
            var a=p/5*Math.PI*2;
            ctx.beginPath(); ctx.arc(fx+Math.cos(a)*pr*1.3,fy+Math.sin(a)*pr*.75,pr*.7,0,Math.PI*2); ctx.fill();
        }
        ctx.fillStyle=f[3];
        ctx.beginPath(); ctx.arc(fx,fy,pr*.5,0,Math.PI*2); ctx.fill();
    });
}

function tileStone(sx,sy){
    var cx=sx+HW,cy=sy+HH;
    var g=ctx.createLinearGradient(cx,sy,cx,sy+TH_px);
    g.addColorStop(0,'#9898ac'); g.addColorStop(1,'#6c6c7e');
    fillDiamond(sx,sy,g);
    ctx.strokeStyle='rgba(55,55,68,0.6)'; ctx.lineWidth=1;
    ctx.beginPath();
    ctx.moveTo(sx,sy+HH); ctx.lineTo(sx+TW_px,sy+HH);
    ctx.moveTo(sx+HW,sy); ctx.lineTo(sx+HW,sy+TH_px);
    ctx.stroke();
    ctx.fillStyle='rgba(180,180,205,0.16)';
    ctx.beginPath();
    ctx.moveTo(sx+HW,sy); ctx.lineTo(cx,sy+HH*.5); ctx.lineTo(sx,sy+HH); ctx.closePath();
    ctx.fill();
    strokeDiamond(sx,sy,'rgba(50,50,65,0.45)');
}

function tileFairyRing(sx,sy,t){
    tileStone(sx,sy);
    var cx=sx+HW, cy=sy+HH;
    var pulse=0.5+Math.sin(t*2.2)*0.3;
    ctx.save();
    ctx.shadowColor='#b496ff'; ctx.shadowBlur=22;
    ctx.strokeStyle='rgba(200,160,255,'+(0.5+pulse*.3)+')';
    ctx.lineWidth=3;
    ctx.beginPath(); ctx.ellipse(cx,cy,HW*.72,HH*.72,0,0,Math.PI*2); ctx.stroke();
    ctx.restore();
    ctx.fillStyle='rgba(180,140,255,'+(pulse*.14)+')';
    ctx.beginPath(); ctx.ellipse(cx,cy,HW*.72,HH*.72,0,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='rgba(255,200,255,'+(0.28+pulse*.18)+')'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.ellipse(cx,cy,HW*.46,HH*.46,0,0,Math.PI*2); ctx.stroke();
    for(var i=0;i<9;i++){
        var a=(i/9)*Math.PI*2+t*.55;
        var blink=0.35+Math.sin(t*3+i*1.3)*.4;
        ctx.fillStyle='rgba(255,240,200,'+blink+')';
        ctx.beginPath(); ctx.arc(cx+Math.cos(a)*HW*.72,cy+Math.sin(a)*HH*.72,1.5+blink*1.2,0,Math.PI*2); ctx.fill();
    }
    ctx.fillStyle='rgba(255,220,255,'+(0.6+Math.sin(t*2.5)*.3)+')';
    ctx.beginPath(); ctx.arc(cx,cy,2.8,0,Math.PI*2); ctx.fill();
}

function tileSand(sx,sy){
    var cx=sx+HW;
    var g=ctx.createLinearGradient(cx,sy,cx,sy+TH_px);
    g.addColorStop(0,'#e8cc88'); g.addColorStop(1,'#bfa060');
    fillDiamond(sx,sy,g);
    ctx.strokeStyle='rgba(155,118,55,0.28)'; ctx.lineWidth=0.8;
    for(var i=0;i<3;i++){
        var ry=sy+TH_px*(0.22+i*0.23), hw2=HW*(0.9-i*.15);
        ctx.beginPath(); ctx.moveTo(cx-hw2,ry); ctx.lineTo(cx+hw2,ry); ctx.stroke();
    }
    strokeDiamond(sx,sy,'rgba(160,130,65,0.3)');
}

function tileTree(sx,sy){
    var cx=sx+HW, cy=sy+HH;
    var gd=ctx.createLinearGradient(cx,sy,cx,sy+TH_px);
    gd.addColorStop(0,'#1c4018'); gd.addColorStop(1,'#122c10');
    fillDiamond(sx,sy,gd);
    strokeDiamond(sx,sy,'rgba(12,28,10,0.5)');
    var tkW=Math.max(4,Math.round(TW_px*.1));
    var tkH=Math.round(TH_px*1.5);
    var tkg=ctx.createLinearGradient(cx-tkW,0,cx+tkW,0);
    tkg.addColorStop(0,'#3a1e0c'); tkg.addColorStop(0.45,'#6e4020'); tkg.addColorStop(1,'#3a1e0c');
    ctx.fillStyle=tkg;
    ctx.fillRect(cx-Math.round(tkW/2),cy-tkH,tkW,tkH);
    var top=cy-tkH;
    ctx.fillStyle='#1a3e16';
    ctx.beginPath(); ctx.arc(cx,top,TW_px*.44,0,Math.PI*2); ctx.fill();
    var cg=ctx.createRadialGradient(cx-HW*.15,top-TH_px*.12,0,cx,top,TW_px*.42);
    cg.addColorStop(0,'#62cc50'); cg.addColorStop(0.5,'#3c8c28'); cg.addColorStop(1,'#1c5012');
    ctx.fillStyle=cg;
    ctx.beginPath(); ctx.arc(cx,top,TW_px*.42,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#48a438';
    ctx.beginPath(); ctx.arc(cx-HW*.35,top+TH_px*.05,TW_px*.26,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx+HW*.3,top+TH_px*.08,TW_px*.22,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#74dc58';
    ctx.beginPath(); ctx.arc(cx,top-TH_px*.32,TW_px*.16,0,Math.PI*2); ctx.fill();
}

function tileRock(sx,sy){
    tileGrass(sx,sy);
    var cx=sx+HW, cy=sy+HH;
    ctx.fillStyle='rgba(0,0,0,.25)';
    ctx.beginPath(); ctx.ellipse(cx+HH*.2,cy+HH*.35,HW*.3,HH*.18,0,0,Math.PI*2); ctx.fill();
    var rg=ctx.createRadialGradient(cx-HW*.12,cy-HH*.18,0,cx,cy,HW*.32);
    rg.addColorStop(0,'#9898b0'); rg.addColorStop(0.55,'#6e6e88'); rg.addColorStop(1,'#4c4c60');
    ctx.fillStyle=rg;
    ctx.beginPath(); ctx.ellipse(cx,cy,HW*.32,HH*.35,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(210,210,230,0.32)';
    ctx.beginPath(); ctx.ellipse(cx-HW*.1,cy-HH*.12,HW*.15,HH*.12,-.4,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='rgba(35,35,48,0.32)'; ctx.lineWidth=0.8;
    ctx.beginPath(); ctx.moveTo(cx-HW*.06,cy-HH*.15); ctx.lineTo(cx+HW*.1,cy+HH*.1); ctx.stroke();
}

function drawTile(type,sx,sy,t){
    switch(type){
        case TG: tileGrass(sx,sy); break;
        case TD: tileDirt(sx,sy); break;
        case TW: tileWater(sx,sy,t); break;
        case TF: tileFlowers(sx,sy,t); break;
        case TK: tileDark(sx,sy); break;
        case TS: tileStone(sx,sy); break;
        case TY: tileFairyRing(sx,sy,t); break;
        case TN: tileSand(sx,sy); break;
        case TR: tileTree(sx,sy); break;
        case TO: tileRock(sx,sy); break;
    }
}

var fairy={gender:'',skin:'',glowColor:'#ff96c8',wingStyle:'butterfly',name:''};

function fairyEmoji(){

}

function loadFairy(){

    }catch(e){}
}

}

// Wings drawn BEFORE the fairy emoji (so they appear behind)
function drawWings(cx,cy,t){
    ctx.save();
    switch(fairy.wingStyle){
        case 'dragonfly': drawDragonflyWings(cx,cy,t); break;
        case 'petal':     drawPetalWings(cx,cy,t); break;
        case 'sparkle':   drawSparkleWings(cx,cy,t); break;
        default:          drawButterflyWings(cx,cy,t);
    }
    ctx.restore();
}

function drawButterflyWings(cx,cy,t){
    var flap=Math.sin(t*4.5)*0.18;
    var gc=fairy.glowColor;
    ctx.shadowColor=gc; ctx.shadowBlur=18;
    // upper wings
    ctx.beginPath();
    ctx.moveTo(cx,cy);
    ctx.bezierCurveTo(cx-HW*0.15,cy-HH*0.7,cx-HW*(1.2+flap),cy-HH*1.0,cx-HW*(0.7+flap*0.5),cy+HH*0.1);
    ctx.bezierCurveTo(cx-HW*0.4,cy+HH*0.2,cx-HW*0.05,cy,cx,cy);
    ctx.moveTo(cx,cy);
    ctx.bezierCurveTo(cx+HW*0.15,cy-HH*0.7,cx+HW*(1.2+flap),cy-HH*1.0,cx+HW*(0.7+flap*0.5),cy+HH*0.1);
    ctx.bezierCurveTo(cx+HW*0.4,cy+HH*0.2,cx+HW*0.05,cy,cx,cy);
    ctx.fillStyle=gc+'2e'; ctx.fill();
    ctx.strokeStyle=gc+'aa'; ctx.lineWidth=1.5; ctx.stroke();
    // lower wings
    ctx.beginPath();
    ctx.moveTo(cx,cy+HH*0.1);
    ctx.bezierCurveTo(cx-HW*0.1,cy+HH*0.4,cx-HW*(0.75+flap*0.3),cy+HH*0.75,cx-HW*(0.35+flap*0.2),cy+HH*0.55);
    ctx.bezierCurveTo(cx-HW*0.2,cy+HH*0.4,cx-HW*0.05,cy+HH*0.25,cx,cy+HH*0.1);
    ctx.moveTo(cx,cy+HH*0.1);
    ctx.bezierCurveTo(cx+HW*0.1,cy+HH*0.4,cx+HW*(0.75+flap*0.3),cy+HH*0.75,cx+HW*(0.35+flap*0.2),cy+HH*0.55);
    ctx.bezierCurveTo(cx+HW*0.2,cy+HH*0.4,cx+HW*0.05,cy+HH*0.25,cx,cy+HH*0.1);
    ctx.fillStyle=gc+'1a'; ctx.fill();
    ctx.strokeStyle=gc+'66'; ctx.lineWidth=1; ctx.stroke();
    ctx.shadowBlur=0;
}

function drawDragonflyWings(cx,cy,t){
    var flap=Math.sin(t*9)*0.07;
    var gc=fairy.glowColor;
    ctx.shadowColor=gc; ctx.shadowBlur=14;
    // 4 elongated wings
    var defs=[
        [-HW*1.3,-HH*0.25,-HW*0.7,HH*0.18,-flap],
        [ HW*1.3,-HH*0.25, HW*0.7,HH*0.18, flap],
        [-HW*1.1, HH*0.3, -HW*0.5,HH*0.55,-flap*0.5],
        [ HW*1.1, HH*0.3,  HW*0.5,HH*0.55, flap*0.5]
    ];
    defs.forEach(function(d){
        ctx.save();
        ctx.translate(cx,cy);
        ctx.rotate(d[4]);
        ctx.beginPath();
        ctx.moveTo(0,0);
        ctx.bezierCurveTo(d[0]*0.5,d[1]*0.4,d[0],d[1]*0.6,d[0],d[1]);
        ctx.bezierCurveTo(d[0]*0.8,d[3]*0.5,d[2],d[3],0,0);
        ctx.fillStyle=gc+'22'; ctx.fill();
        ctx.strokeStyle=gc+'99'; ctx.lineWidth=1.2; ctx.stroke();
        ctx.restore();
    });
    ctx.shadowBlur=0;
}

function drawPetalWings(cx,cy,t){
    var drift=Math.sin(t*1.8)*0.1;
    var gc=fairy.glowColor;
    ctx.shadowColor=gc; ctx.shadowBlur=16;
    var petals=[
        {side:-1,vy:-1,scale:1.0},
        {side: 1,vy:-1,scale:1.0},
        {side:-1,vy: 1,scale:0.7},
        {side: 1,vy: 1,scale:0.7}
    ];
    petals.forEach(function(p,i){
        ctx.save();
        ctx.translate(cx+p.side*HW*0.06,cy+p.vy*HH*0.1);
        ctx.rotate(p.side*(0.35+drift)+(p.vy>0?0.4:0));
        ctx.scale(p.side,1);
        ctx.beginPath();
        ctx.moveTo(0,0);
        ctx.bezierCurveTo(HW*0.2*p.scale,-HH*0.9*p.scale,HW*0.9*p.scale,-HH*0.8*p.scale,HW*0.55*p.scale,HH*0.15*p.scale);
        ctx.bezierCurveTo(HW*0.3*p.scale,HH*0.3*p.scale,HW*0.05*p.scale,HH*0.1*p.scale,0,0);
        ctx.fillStyle=gc+(i<2?'28':'1a');
        ctx.fill();
        ctx.strokeStyle=gc+(i<2?'99':'66'); ctx.lineWidth=1;
        ctx.stroke();
        ctx.restore();
    });
    ctx.shadowBlur=0;
}

function drawSparkleWings(cx,cy,t){
    var gc=fairy.glowColor;
    ctx.shadowColor=gc; ctx.shadowBlur=22;
    var count=14;
    for(var i=0;i<count;i++){
        var a=(i/count)*Math.PI*2+t*0.7;
        var dist=HW*(0.55+Math.sin(t*1.8+i*0.9)*0.28);
        var blink=0.25+Math.sin(t*3.5+i*1.6)*0.45;
        if(blink<0.04) continue;
        ctx.globalAlpha=Math.max(0,blink);
        ctx.fillStyle=gc;
        var px=cx+Math.cos(a)*dist, py=cy+Math.sin(a)*dist*0.52;
        ctx.beginPath(); ctx.arc(px,py,1.4+blink*2,0,Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha=1; ctx.shadowBlur=0;
}

// ── Customizer UI handlers ─────────────────────────────────────────────────────
function openCustomizer(){
    document.getElementById('fairy-name-input').value=fairy.name||'';
    // sync gender
    document.querySelectorAll('#gender-row .sw-emoji').forEach(function(el){
        el.classList.toggle('on',(el.getAttribute('data-gender')||'')===(fairy.gender||''));
    });
    // sync skin
    document.querySelectorAll('#skin-row .sw').forEach(function(el){
        el.classList.toggle('on',(el.getAttribute('data-skin')||'')===(fairy.skin||''));
    });
    // sync wing
    document.querySelectorAll('#wing-row .wing-opt').forEach(function(el){
        el.classList.toggle('on',el.getAttribute('data-wing')===fairy.wingStyle);
    });
    // sync glow
    document.querySelectorAll('#glow-row .sw').forEach(function(el){
        el.classList.toggle('on',el.getAttribute('data-glow')===fairy.glowColor);
    });
    document.getElementById('cust-modal').classList.add('open');
}
function closeCustomizer(){
    document.getElementById('cust-modal').classList.remove('open');
}
function saveFairyAndClose(){
    fairy.name=document.getElementById('fairy-name-input').value.trim();
    saveFairy();
    closeCustomizer();
}
function selectGender(el){
    document.querySelectorAll('#gender-row .sw-emoji').forEach(function(e){e.classList.remove('on');});
    el.classList.add('on');
    fairy.gender=el.getAttribute('data-gender')||'';
}
function selectSkin(el){
    document.querySelectorAll('#skin-row .sw').forEach(function(e){e.classList.remove('on');});
    el.classList.add('on');
    fairy.skin=el.getAttribute('data-skin')||'';
}
function selectWing(el){
    document.querySelectorAll('#wing-row .wing-opt').forEach(function(e){e.classList.remove('on');});
    el.classList.add('on');
    fairy.wingStyle=el.getAttribute('data-wing');
}
function selectGlow(el){
    document.querySelectorAll('#glow-row .sw').forEach(function(e){e.classList.remove('on');});
    el.classList.add('on');
    fairy.glowColor=el.getAttribute('data-glow');
}
document.getElementById('cust-modal').addEventListener('click',function(e){
    if(e.target===this) closeCustomizer();
});

function toggleBuild(){
    buildMode=!buildMode;
    var btn=document.getElementById('build-btn');
    var panel=document.getElementById('build-panel');
    if(buildMode){
        btn.classList.add('active');
        panel.classList.add('open');
        renderPalette();
    } else {
        btn.classList.remove('active');
        panel.classList.remove('open');
        eraseMode=false;
        selectedItem=null;
        document.getElementById('erase-btn').classList.remove('active');
        document.getElementById('build-cursor').style.display='none';
    }
}

function setBuildTab(tab,el){
    buildTab=tab; selectedItem=null;
    document.querySelectorAll('.bp-tab').forEach(function(t){t.classList.remove('active');});
    el.classList.add('active');
    renderPalette();
}

function toggleErase(){
    eraseMode=!eraseMode;
    selectedItem=null;
    var btn=document.getElementById('erase-btn');
    if(eraseMode){
        btn.classList.add('active');
        document.getElementById('build-cursor').style.display='block';
        document.getElementById('build-cursor').textContent='🗑️';
        renderPalette();
    } else {
        btn.classList.remove('active');
        document.getElementById('build-cursor').style.display='none';
    }
}

function renderPalette(){
    var grid=document.getElementById('palette-grid');
    var items=PALETTE[buildTab]||[];
    grid.innerHTML='';
    items.forEach(function(item){
        var div=document.createElement('div');
        div.className='pi'+(selectedItem&&selectedItem.emoji===item.emoji?' active':'');
        div.innerHTML=item.emoji+'<span>'+item.label+'</span>';
        div.onclick=function(){
            eraseMode=false;
            document.getElementById('erase-btn').classList.remove('active');
            selectedItem=(selectedItem&&selectedItem.emoji===item.emoji)?null:item;
            if(selectedItem){
                document.getElementById('build-cursor').textContent=item.emoji;
                document.getElementById('build-cursor').style.display='block';
            } else {
                document.getElementById('build-cursor').style.display='none';
            }
            document.querySelectorAll('.pi').forEach(function(p){p.classList.remove('active');});
            if(selectedItem) div.classList.add('active');
        };
        grid.appendChild(div);
    });
}

// Convert screen coords → iso tile coords
function screenToTile(sx,sy){
    var u=sx-OX+cam.x;
    var v=sy-OY+cam.y;
    var col=Math.round((u/HW+v/HH)/2);
    var row=Math.round((v/HH-u/HW)/2);
    return{tc:col,tr:row};
}

// Follow mouse with build cursor
window.addEventListener('mousemove',function(e){
    var cur=document.getElementById('build-cursor');
    if(!buildMode||(cur.style.display==='none')) return;
    cur.style.left=e.clientX+'px';
    cur.style.top=e.clientY+'px';
});

// Canvas click: place or erase
canvas.addEventListener('pointerdown',function(e){
    if(!started||!buildMode) return;
    if(!selectedItem&&!eraseMode) return;
    var rect=canvas.getBoundingClientRect();
    var pos=screenToTile(e.clientX-rect.left, e.clientY-rect.top);
    if(pos.tc<0||pos.tc>=MC||pos.tr<0||pos.tr>=MR) return;
    var key=pos.tr+','+pos.tc;
    if(eraseMode){
        delete placed[key];
    } else {
        placed[key]={emoji:selectedItem.emoji,label:selectedItem.label};
    }
    savePlaced();
    e.stopPropagation();
},{passive:false});

// Right-click to erase quickly
canvas.addEventListener('contextmenu',function(e){
    if(!started||!buildMode) return;
    e.preventDefault();
    var rect=canvas.getBoundingClientRect();
    var pos=screenToTile(e.clientX-rect.left, e.clientY-rect.top);
    if(pos.tc<0||pos.tc>=MC||pos.tr<0||pos.tr>=MR) return;
    delete placed[pos.tr+','+pos.tc];
    savePlaced();
});

// ── Player ─────────────────────────────────────────────────────────────────────
var pl={tc:27,tr:22,wx:0,wy:0,moving:false,dir:'r',flip:false};

function initPlayer(){
    pl.tc=27; pl.tr=22;
    pl.wx=(27-22)*HW; pl.wy=(27+22)*HH;
    pl.moving=false; pl.flip=false;
    cam.x=pl.wx; cam.y=pl.wy;
}

function drawPlayer(t){
    var pcx=Math.round(pl.wx-cam.x)+OX+HW;
    var pcy=Math.round(pl.wy-cam.y)+OY+HH;
    var bob=Math.sin(t*3.2)*2.8, py=pcy+bob;

    // Ground shadow
    ctx.fillStyle='rgba(0,0,0,.24)';
    ctx.beginPath(); ctx.ellipse(pcx,pcy+HH*.25,HW*.28,HH*.22,0,0,Math.PI*2); ctx.fill();

    if(Math.random()<0.45) spawnDust(pcx,py);

    // Wings (behind fairy)
    drawWings(pcx,py-Math.round(HH*0.3),t);

    // Fairy emoji
    ctx.save();
    if(pl.flip){ ctx.translate(pcx,0); ctx.scale(-1,1); ctx.translate(-pcx,0); }
    var sz=Math.round(HW*1.6);
    ctx.font=sz+'px serif';
    ctx.textAlign='center'; ctx.textBaseline='bottom';
    ctx.shadowColor=fairy.glowColor; ctx.shadowBlur=26;
    ctx.fillText(fairyEmoji(),pcx,py);
    ctx.shadowColor=fairy.glowColor; ctx.shadowBlur=14;
    ctx.fillText(fairyEmoji(),pcx,py);
    ctx.shadowBlur=0;
    ctx.restore();

    // Fairy name floating above
    if(fairy.name){
        ctx.save();
        var nameSz=Math.max(10,Math.round(HH*0.72));
        ctx.font='700 '+nameSz+'px Quicksand,sans-serif';
        ctx.textAlign='center'; ctx.textBaseline='bottom';
        ctx.shadowColor=fairy.glowColor; ctx.shadowBlur=14;
        ctx.fillStyle='#f8e8ff';
        ctx.fillText(fairy.name,pcx,py-sz*0.92);
        ctx.shadowBlur=0;
        ctx.restore();
    }
}

// ── Particles ──────────────────────────────────────────────────────────────────
var parts=[];
var DUST_CLR=['#ff96c8','#ffffa0','#b496ff','#96ffdc','#fff'];

function spawnDust(x,y){
    var a=Math.random()*Math.PI*2, spd=10+Math.random()*22;
    parts.push({x:x,y:y,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd-12,life:1,ml:0.45+Math.random()*.4,r:1.2+Math.random()*2.2,c:DUST_CLR[Math.floor(Math.random()*DUST_CLR.length)]});
}

function spawnBurst(x,y){
    for(var i=0;i<16;i++){
        var a=Math.PI*2*i/16+Math.random()*.35, spd=28+Math.random()*75;
        parts.push({x:x,y:y,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd-10,life:1,ml:.55+Math.random()*.5,r:2+Math.random()*3.5,c:DUST_CLR[Math.floor(Math.random()*DUST_CLR.length)]});
    }
}

// ── Fireflies ──────────────────────────────────────────────────────────────────
var fireflies=[];
var FFY_MAX=28;
var FFY_CLR=['#ffffa0','#c0ffb0','#fff0b0','#e0ffff'];

function updateFireflies(dt,t){
    if(fireflies.length<FFY_MAX){
        var iwx=cam.x+(Math.random()*1.3-.15)*SW;
        var iwy=cam.y+(Math.random()*1.3-.15)*SH;
        var gc=Math.round((iwx/HW+iwy/HH)*.5);
        var gr=Math.round((iwy/HH-iwx/HW)*.5);
        if(gc>=0&&gc<MC&&gr>=0&&gr<MR){
            var tile=map[gr][gc];
            if(tile===TG||tile===TF||tile===TK){
                fireflies.push({
                    iwx:iwx,iwy:iwy,
                    vx:(Math.random()-.5)*20, vy:(Math.random()-.5)*14,
                    phase:Math.random()*Math.PI*2, freq:1.4+Math.random()*2.2,
                    life:1, ml:4+Math.random()*6,
                    r:1.5+Math.random()*1.5,
                    c:FFY_CLR[Math.floor(Math.random()*FFY_CLR.length)]
                });
            }
        }
    }
    for(var i=fireflies.length-1;i>=0;i--){
        var f=fireflies[i];
        f.iwx+=f.vx*dt; f.iwy+=f.vy*dt;
        f.vx+=(Math.random()-.5)*16*dt; f.vy+=(Math.random()-.5)*12*dt;
        f.vx*=0.985; f.vy*=0.985;
        f.life-=dt/f.ml;
        var fsx=f.iwx-cam.x+OX, fsy=f.iwy-cam.y+OY;
        if(f.life<=0||fsx<-120||fsx>SW+120||fsy<-120||fsy>SH+120) fireflies.splice(i,1);
    }
}

function drawFireflies(t){
    for(var i=0;i<fireflies.length;i++){
        var f=fireflies[i];
        var glow=0.28+Math.sin(t*f.freq+f.phase)*.38;
        if(glow<0.04) continue;
        var fsx=Math.round(f.iwx-cam.x)+OX, fsy=Math.round(f.iwy-cam.y)+OY;
        ctx.save();
        ctx.globalAlpha=f.life*Math.max(0,glow);
        ctx.shadowColor=f.c; ctx.shadowBlur=10;
        ctx.fillStyle=f.c;
        ctx.beginPath(); ctx.arc(fsx,fsy,f.r,0,Math.PI*2); ctx.fill();
        ctx.restore();
    }
}

// ── Ambient glow ───────────────────────────────────────────────────────────────
function drawAmbientGlow(t){
    var fr=tileScreenPos(27,20);
    var frSX=fr.sx+HW, frSY=fr.sy+HH;
    var frPulse=0.09+Math.sin(t*1.8)*.035;
    var frG=ctx.createRadialGradient(frSX,frSY,HW*.5,frSX,frSY,HW*6.5);
    frG.addColorStop(0,'rgba(175,130,255,'+frPulse+')');
    frG.addColorStop(1,'rgba(175,130,255,0)');
    ctx.fillStyle=frG; ctx.fillRect(0,0,SW,SH);

    var lk=tileScreenPos(43,8);
    var lkSX=lk.sx+HW, lkSY=lk.sy+HH;
    var lkPulse=0.065+Math.sin(t*.9+1.2)*.022;
    var lkG=ctx.createRadialGradient(lkSX,lkSY,HW,lkSX,lkSY,HW*10);
    lkG.addColorStop(0,'rgba(55,118,210,'+lkPulse+')');
    lkG.addColorStop(1,'rgba(55,118,210,0)');
    ctx.fillStyle=lkG; ctx.fillRect(0,0,SW,SH);
}

// ── Zone names ─────────────────────────────────────────────────────────────────
var ZONES=[
    {r1:4,c1:36,r2:16,c2:52,name:'\uD83C\uDF0A The Lake'},
    {r1:17,c1:23,r2:23,c2:31,name:'\u2728 The Fairy Ring'},
    {r1:0,c1:0,r2:MR,c2:MC,name:'\uD83C\uDF3F The Meadow'}
];
var curZone='';
function checkZone(){
    var n=ZONES[ZONES.length-1].name;
    for(var i=0;i<ZONES.length-1;i++){
        var z=ZONES[i];
        if(pl.tr>=z.r1&&pl.tr<z.r2&&pl.tc>=z.c1&&pl.tc<z.c2){n=z.name;break;}
    }
    if(n!==curZone){curZone=n;document.getElementById('zone-name').textContent=n;}
}

// ── Input ──────────────────────────────────────────────────────────────────────
var keys={};
document.addEventListener('keydown',function(e){
    keys[e.key]=true;
    if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) e.preventDefault();
});
document.addEventListener('keyup',function(e){keys[e.key]=false;});
function dp(d,v){ keys['_'+d]=v; }
function inputDir(){
    if(keys['ArrowUp']   ||keys['w']||keys['W']||keys['_u']) return 'u';
    if(keys['ArrowDown'] ||keys['s']||keys['S']||keys['_d']) return 'd';
    if(keys['ArrowLeft'] ||keys['a']||keys['A']||keys['_l']) return 'l';
    if(keys['ArrowRight']||keys['d']||keys['D']||keys['_r']) return 'r';
    return null;
}
var DC={u:[0,-1],d:[0,1],l:[-1,0],r:[1,0]};

// ── Update ─────────────────────────────────────────────────────────────────────
var SPEED=5.0;
function update(dt,t){
    if(pl.moving){
        var twx=(pl.tc-pl.tr)*HW, twy=(pl.tc+pl.tr)*HH;
        var dx=twx-pl.wx, dy=twy-pl.wy;
        var dist=Math.sqrt(dx*dx+dy*dy);
        var step=SPEED*Math.sqrt(HW*HW+HH*HH)*dt;
        if(dist<=step){
            pl.wx=twx; pl.wy=twy; pl.moving=false;
            if(map[pl.tr][pl.tc]===TY){
                var bx=Math.round(pl.wx-cam.x)+OX+HW;
                var by=Math.round(pl.wy-cam.y)+OY+HH;
                spawnBurst(bx,by);
            }
            checkZone();
        } else {
            pl.wx+=dx/dist*step; pl.wy+=dy/dist*step;
        }
    } else {
        var dir=inputDir();
        if(dir){
            var d=DC[dir], nc=pl.tc+d[0], nr=pl.tr+d[1];
            if(nc>=0&&nc<MC&&nr>=0&&nr<MR&&WALK[map[nr][nc]]){
                pl.tc=nc; pl.tr=nr; pl.moving=true;
                pl.dir=dir; pl.flip=(dir==='l'||dir==='d');
            }
        }
    }

    cam.x+=(pl.wx-cam.x)*.11; cam.y+=(pl.wy-cam.y)*.11;

    for(var i=parts.length-1;i>=0;i--){
        var p=parts[i];
        p.x+=p.vx*dt; p.y+=p.vy*dt; p.vy+=58*dt;
        p.life-=dt/p.ml;
        if(p.life<=0) parts.splice(i,1);
    }

    updateFireflies(dt,t);
}

// ── Draw ───────────────────────────────────────────────────────────────────────
function draw(t){
    var bgG=ctx.createLinearGradient(0,0,0,SH);
    bgG.addColorStop(0,'#090522'); bgG.addColorStop(1,'#040210');
    ctx.fillStyle=bgG; ctx.fillRect(0,0,SW,SH);
    if(!started) return;

    var depthMin=Math.max(0,Math.floor((cam.y-OY-TH_px*5)/HH)-1);
    var depthMax=Math.min(MR+MC-2,Math.ceil((cam.y-OY+SH)/HH)+2);

    var plDepth=Math.round(pl.wy/HH);
    var plDrawn=false;

    for(var depth=depthMin;depth<=depthMax;depth++){
        var rFrom=Math.max(0,depth-(MC-1));
        var rTo=Math.min(MR-1,depth);
        for(var dr=rFrom;dr<=rTo;dr++){
            var dc=depth-dr;
            if(dc<0||dc>=MC) continue;
            var sp=tileScreenPos(dc,dr);
            if(sp.sx+TW_px<0||sp.sx>SW||sp.sy+TH_px*5<0||sp.sy>SH) continue;
            drawTile(map[dr][dc],sp.sx,sp.sy,t);
            drawPlaced(dc,dr,sp.sx,sp.sy);
        }
        if(!plDrawn&&depth>=plDepth){ drawPlayer(t); plDrawn=true; }
    }
    if(!plDrawn) drawPlayer(t);

    drawAmbientGlow(t);
    drawFireflies(t);

    for(var i=0;i<parts.length;i++){
        var pt=parts[i];
        ctx.globalAlpha=pt.life*.88;
        ctx.fillStyle=pt.c; ctx.shadowColor=pt.c; ctx.shadowBlur=6;
        ctx.beginPath(); ctx.arc(pt.x,pt.y,pt.r,0,Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha=1; ctx.shadowBlur=0;

    var vg=ctx.createRadialGradient(SW/2,SH/2,SH*.2,SW/2,SH/2,SH*.88);
    vg.addColorStop(0,'rgba(0,0,0,0)'); vg.addColorStop(1,'rgba(1,0,7,.65)');
    ctx.fillStyle=vg; ctx.fillRect(0,0,SW,SH);
}

// ── Main loop ──────────────────────────────────────────────────────────────────
var started=false,lastTS=0,gt=0;

function loop(ts){
    var dt=Math.min((ts-lastTS)/1000,.05); lastTS=ts;
    if(started){ gt+=dt; update(dt,gt); }
    draw(gt);
    requestAnimationFrame(loop);
}

function enterPortal(){
    if(started) return;
    document.getElementById('start-screen').style.display='none';
    document.getElementById('ui').style.display='flex';
    if('ontouchstart' in window) document.getElementById('dpad').style.display='block';
    map=buildMap();
    initPlayer();
    loadFairy();
    loadPlaced();
    checkZone();
    started=true;
}

requestAnimationFrame(loop);
</script>
