<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Wishing Well ✦ Pixie Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&family=Pacifico&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:#060410; overflow:hidden; font-family:'Quicksand',sans-serif; touch-action:none; user-select:none; -webkit-user-select:none; }
        canvas { display:block; }

        #start-screen {
            position:fixed; inset:0; z-index:100;
            display:flex; flex-direction:column; justify-content:center; align-items:center;
            cursor:pointer;
            background:radial-gradient(ellipse at center,rgba(20,8,45,0.97) 0%,rgba(4,2,12,0.99) 100%);
        }
        #start-screen h1 {
            font-family:'Pacifico',cursive; font-size:52px; color:#ffd700;
            text-shadow:0 0 40px rgba(255,215,0,0.5),0 0 80px rgba(180,150,255,0.3);
            margin-bottom:6px;
        }
        .well-icon { font-size:80px; margin:14px 0; animation:wellPulse 3s ease-in-out infinite; filter:drop-shadow(0 0 30px rgba(255,215,0,0.6)); }
        @keyframes wellPulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.06) translateY(-6px)} }
        .tap-text { color:#b496ff; font-size:20px; font-weight:600; margin-top:14px; animation:blink 2s ease-in-out infinite; letter-spacing:2px; }
        @keyframes blink { 0%,100%{opacity:0.4} 50%{opacity:1} }
        .hint { color:#504060; font-size:13px; margin-top:10px; text-align:center; line-height:1.7; }

        #ui {
            position:fixed; top:0; left:0; right:0; padding:10px 20px;
            display:none; justify-content:space-between; align-items:center;
            z-index:10; pointer-events:none;
            background:linear-gradient(180deg,rgba(4,2,14,0.88) 0%,transparent 100%);
        }
        #ui > * { pointer-events:auto; }
        .back-btn { color:#b496ff; font-size:13px; cursor:pointer; padding:6px 14px; border:1px solid rgba(180,150,255,0.3); border-radius:20px; text-decoration:none; }
        .back-btn:hover { border-color:#ff96c8; color:#ff96c8; }
        #score-disp { color:#ffd700; font-size:18px; font-weight:700; text-shadow:0 0 12px rgba(255,215,0,0.5); }
        #throws-disp { color:#c090ff; font-size:14px; font-weight:600; }

        #game-over {
            display:none; position:fixed; inset:0; z-index:100;
            background:rgba(4,2,14,0.92); backdrop-filter:blur(8px);
            flex-direction:column; justify-content:center; align-items:center;
        }
        #game-over.show { display:flex; }
        #game-over h1 { font-family:'Pacifico',cursive; color:#ffd700; font-size:44px; text-shadow:0 0 30px rgba(255,215,0,0.5); margin-bottom:8px; }
        #final-score { font-size:72px; font-weight:700; color:#ffd700; text-shadow:0 0 30px rgba(255,215,0,0.4); margin:10px 0; }
        #final-detail { color:#b496ff; font-size:15px; margin-bottom:26px; text-align:center; line-height:2; }
        .go-btn { padding:12px 32px; border-radius:25px; border:none; background:linear-gradient(135deg,#ffd700,#ffaa00); color:#1a0a00; font-family:'Quicksand',sans-serif; font-weight:700; font-size:16px; cursor:pointer; margin:5px; transition:transform 0.2s; }
        .go-btn:hover { transform:scale(1.05); }
        .go-ghost { background:transparent; color:#b496ff; border:1px solid rgba(180,150,255,0.3); }
        .go-ghost:hover { border-color:#ff96c8; color:#ff96c8; }

        #bonus-banner {
            display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
            z-index:50; text-align:center; pointer-events:none;
        }
        #bonus-banner .bb-title { font-family:'Pacifico',cursive; font-size:48px; color:#ffd700; text-shadow:0 0 40px rgba(255,215,0,0.8); }
        #bonus-banner .bb-sub { color:#ffee88; font-size:18px; font-weight:600; margin-top:6px; }

        #wish-flash {
            display:none; position:fixed; inset:0; pointer-events:none; z-index:30;
            background:radial-gradient(ellipse at center, rgba(255,215,0,0.18) 0%, transparent 70%);
            animation:wishFade 0.8s ease-out forwards;
        }
        @keyframes wishFade { 0%{opacity:1} 100%{opacity:0} }
    </style>
</head>
<body>
<canvas id="c"></canvas>

<div id="start-screen" onclick="startGame()">
    <h1>Wishing Well</h1>
    <div class="well-icon">🪙</div>
    <div class="tap-text">Tap to Play</div>
    <div class="hint">
        Toss glowing coins into the moving well<br>
        Hit the center for a <span style="color:#ffd700;font-weight:700;">WISH</span> ✨<br>
        3 wishes in a row unlocks a <span style="color:#ff96c8;font-weight:700;">Bonus Round!</span>
    </div>
</div>

<div id="ui">
    <a class="back-btn" href="/index.html">← Back</a>
    <div id="score-disp">✦ 0</div>
    <div id="throws-disp">🪙 10</div>
</div>

<div id="bonus-banner">
    <div class="bb-title">✨ WISH GRANTED ✨</div>
    <div class="bb-sub">Bonus Round! Catch the falling stars!</div>
</div>

<div id="wish-flash"></div>

<div id="game-over">
    <h1>✦ Final Score ✦</h1>
    <div id="final-score">0</div>
    <div id="final-detail"></div>
    <button class="go-btn" onclick="restartGame()">Play Again 🪙</button>
    <button class="go-btn go-ghost" onclick="window.location.href='/index.html'">← Home</button>
</div>

<script>
var canvas = document.getElementById('c');
var ctx = canvas.getContext('2d');
var SW, SH;

function resize(){
    SW = canvas.width = window.innerWidth;
    SH = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// ── Stars background ──────────────────────────────────
var BG_STARS = (function(){
    var s=[], sd=7919;
    function r(){ sd=(sd*16807)&0x7fffffff; return sd/0x7fffffff; }
    for(var i=0;i<80;i++) s.push({x:r(),y:r()*0.8,sz:0.6+r()*1.8,sp:0.3+r()*1.2});
    return s;
})();

function drawBackground(t){
    var grad = ctx.createLinearGradient(0,0,0,SH);
    grad.addColorStop(0,'#060412');
    grad.addColorStop(0.5,'#080618');
    grad.addColorStop(1,'#0a0820');
    ctx.fillStyle=grad; ctx.fillRect(0,0,SW,SH);

    // Stars
    for(var i=0;i<BG_STARS.length;i++){
        var s=BG_STARS[i];
        var a=0.3+Math.sin(t*s.sp+i)*0.55;
        ctx.globalAlpha=Math.max(0,a);
        ctx.fillStyle='#ffffff';
        ctx.beginPath(); ctx.arc(s.x*SW,s.y*SH,s.sz,0,Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha=1;
}

// ── Well drawing ──────────────────────────────────────
function drawWell(x, y, t, glowing){
    ctx.save();
    ctx.translate(x, y);

    var W=80, H=70;

    // Shadow
    ctx.fillStyle='rgba(0,0,0,0.3)';
    ctx.beginPath(); ctx.ellipse(0,H*0.5,W*0.6,H*0.12,0,0,Math.PI*2); ctx.fill();

    // Water glow at bottom
    var wg=0.3+Math.sin(t*1.8)*0.15;
    ctx.save();
    ctx.globalAlpha=wg;
    ctx.shadowColor='#40c8ff'; ctx.shadowBlur=24;
    ctx.fillStyle='#1a8aaa';
    ctx.beginPath(); ctx.ellipse(0,H*0.32,W*0.38,H*0.09,0,0,Math.PI*2); ctx.fill();
    ctx.restore();

    // Well body (stone cylinder)
    var bodyGrad=ctx.createLinearGradient(-W*0.45,0,W*0.45,0);
    bodyGrad.addColorStop(0,'#3a3248');
    bodyGrad.addColorStop(0.3,'#5a4e70');
    bodyGrad.addColorStop(0.7,'#4a4060');
    bodyGrad.addColorStop(1,'#2a2238');
    ctx.fillStyle=bodyGrad;
    ctx.beginPath();
    ctx.ellipse(0,-H*0.05,W*0.45,H*0.11,0,0,Math.PI*2);
    ctx.rect(-W*0.45,-H*0.05,W*0.9,H*0.55);
    ctx.ellipse(0,H*0.5,W*0.45,H*0.11,0,0,Math.PI*2);
    ctx.fill();

    // Stone band highlights
    ctx.strokeStyle='rgba(180,160,220,0.18)'; ctx.lineWidth=1;
    for(var b=0;b<3;b++){
        var by2=-H*0.05+b*(H*0.55/3)+H*0.09;
        ctx.beginPath(); ctx.moveTo(-W*0.44,by2); ctx.lineTo(W*0.44,by2); ctx.stroke();
    }

    // Top rim
    var rimGrad=ctx.createLinearGradient(0,-H*0.05-H*0.11,0,-H*0.05+H*0.11);
    rimGrad.addColorStop(0,'#8878a8');
    rimGrad.addColorStop(1,'#3a3258');
    ctx.fillStyle=rimGrad;
    ctx.beginPath(); ctx.ellipse(0,-H*0.05,W*0.45,H*0.11,0,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.12)'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.ellipse(0,-H*0.05,W*0.45,H*0.11,0,0,Math.PI*2); ctx.stroke();

    // Well opening (dark interior)
    ctx.fillStyle='#0a0618';
    ctx.beginPath(); ctx.ellipse(0,-H*0.05,W*0.38,H*0.09,0,0,Math.PI*2); ctx.fill();

    // Water shimmer in opening
    ctx.save();
    ctx.globalAlpha=0.5+Math.sin(t*2.2)*0.2;
    ctx.fillStyle='#2060a0';
    ctx.beginPath(); ctx.ellipse(0,-H*0.05,W*0.38,H*0.09,0,0,Math.PI*2); ctx.fill();
    // Shimmer lines
    ctx.strokeStyle='rgba(150,220,255,0.4)'; ctx.lineWidth=1;
    ctx.beginPath();
    ctx.moveTo(-W*0.2,-H*0.05+H*0.02); ctx.lineTo(W*0.15,-H*0.05-H*0.01); ctx.stroke();
    ctx.globalAlpha=1; ctx.restore();

    // Roof frame (two posts + crossbeam)
    ctx.strokeStyle='#5a4830'; ctx.lineWidth=7; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(-W*0.38,-H*0.05); ctx.lineTo(-W*0.38,-H*0.95); ctx.stroke();
    ctx.beginPath(); ctx.moveTo( W*0.38,-H*0.05); ctx.lineTo( W*0.38,-H*0.95); ctx.stroke();
    ctx.lineWidth=8;
    ctx.beginPath(); ctx.moveTo(-W*0.44,-H*0.9); ctx.lineTo(W*0.44,-H*0.9); ctx.stroke();

    // Roof
    ctx.fillStyle='#6b4c28';
    ctx.beginPath();
    ctx.moveTo(-W*0.52,-H*0.88); ctx.lineTo(0,-H*1.35); ctx.lineTo(W*0.52,-H*0.88);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle='#8a6235';
    ctx.beginPath();
    ctx.moveTo(-W*0.52,-H*0.88); ctx.lineTo(0,-H*1.35); ctx.lineTo(0,-H*0.88);
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle='rgba(255,220,140,0.2)'; ctx.lineWidth=1;
    ctx.beginPath();
    ctx.moveTo(-W*0.52,-H*0.88); ctx.lineTo(0,-H*1.35); ctx.lineTo(W*0.52,-H*0.88);
    ctx.stroke();

    // Rope (hangs from crossbeam center)
    var ropeSwing = Math.sin(t*1.4)*4;
    ctx.strokeStyle='#a08050'; ctx.lineWidth=2; ctx.lineCap='round';
    ctx.beginPath();
    ctx.moveTo(ropeSwing,-H*0.9);
    ctx.quadraticCurveTo(ropeSwing*1.2,-H*0.6,ropeSwing*0.5,-H*0.14);
    ctx.stroke();

    // Bucket
    var bx=ropeSwing*0.5, by2=-H*0.14;
    ctx.fillStyle='#7a5e35';
    ctx.beginPath();
    ctx.moveTo(bx-10,by2); ctx.lineTo(bx-8,by2+18); ctx.lineTo(bx+8,by2+18); ctx.lineTo(bx+10,by2); ctx.closePath();
    ctx.fill();
    ctx.strokeStyle='#c8a060'; ctx.lineWidth=1.5;
    ctx.strokeRect(bx-10,by2,20,18);

    // Glow if active
    if(glowing){
        ctx.shadowColor='#ffd700'; ctx.shadowBlur=40;
        ctx.globalAlpha=0.25+Math.sin(t*3)*0.15;
        ctx.fillStyle='#ffd700';
        ctx.beginPath(); ctx.ellipse(0,-H*0.05,W*0.45,H*0.11,0,0,Math.PI*2); ctx.fill();
        ctx.shadowBlur=0; ctx.globalAlpha=1;
    }

    ctx.restore();
}

// ── Coin drawing ──────────────────────────────────────
function drawCoin(x, y, r, alpha, t){
    ctx.save();
    ctx.globalAlpha=alpha;
    ctx.shadowColor='#ffd700'; ctx.shadowBlur=18;
    var g=ctx.createRadialGradient(x-r*0.25,y-r*0.25,r*0.1,x,y,r);
    g.addColorStop(0,'#fff8c0');
    g.addColorStop(0.4,'#ffd700');
    g.addColorStop(1,'#c88000');
    ctx.fillStyle=g;
    ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.55)';
    ctx.beginPath(); ctx.arc(x-r*0.28,y-r*0.28,r*0.36,0,Math.PI*2); ctx.fill();
    // Coin face ✦
    ctx.globalAlpha=alpha*0.7; ctx.fillStyle='#8a6000';
    ctx.font='bold '+(r*1.1)+'px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('✦',x,y+1);
    ctx.restore();
}

// ── Fairy thrower (simple) ────────────────────────────
function drawFairy(x, y, t, throwing){
    ctx.save();
    var bob = Math.sin(t*3)*3;
    var fy = y + bob;
    var gc='#ff96c8';

    // Wings
    ctx.globalAlpha=0.55+Math.sin(t*4)*0.1;
    ctx.shadowColor=gc; ctx.shadowBlur=14;
    ctx.fillStyle=gc+'88';
    ctx.beginPath(); ctx.ellipse(x-22,fy-18,18,10,-0.5,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(x+22,fy-18,18,10,0.5,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha=1; ctx.shadowBlur=0;

    // Body
    ctx.fillStyle='#ff96c8cc';
    ctx.beginPath();
    ctx.moveTo(x-8,fy-8); ctx.bezierCurveTo(x-16,fy+8,x-12,fy+24,x,fy+26);
    ctx.bezierCurveTo(x+12,fy+24,x+16,fy+8,x+8,fy-8); ctx.closePath(); ctx.fill();

    // Head
    ctx.shadowColor=gc; ctx.shadowBlur=8;
    ctx.fillStyle='#ffd9a0';
    ctx.beginPath(); ctx.arc(x,fy-20,12,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0;

    // Arm raised if throwing
    if(throwing){
        ctx.strokeStyle='#ffd9a0'; ctx.lineWidth=3; ctx.lineCap='round';
        ctx.beginPath(); ctx.moveTo(x+8,fy-8); ctx.quadraticCurveTo(x+20,fy-28,x+28,fy-36); ctx.stroke();
    }

    ctx.restore();
}

// ── Sparkle particles ─────────────────────────────────
var sparks=[];
function spawnSparks(x,y,color,count){
    for(var i=0;i<count;i++){
        var a=Math.random()*Math.PI*2, spd=40+Math.random()*120;
        sparks.push({x:x,y:y,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd-60,life:1,ml:0.6+Math.random()*0.8,r:2+Math.random()*4,c:color});
    }
}
function updateSparks(dt){
    for(var i=sparks.length-1;i>=0;i--){
        var s=sparks[i];
        s.x+=s.vx*dt; s.y+=s.vy*dt; s.vy+=120*dt;
        s.life-=dt/s.ml;
        if(s.life<=0) sparks.splice(i,1);
    }
}
function drawSparks(){
    for(var i=0;i<sparks.length;i++){
        var s=sparks[i];
        ctx.save();
        ctx.globalAlpha=Math.max(0,s.life)*0.9;
        ctx.shadowColor=s.c; ctx.shadowBlur=8;
        ctx.fillStyle=s.c;
        ctx.beginPath(); ctx.arc(s.x,s.y,s.r*s.life,0,Math.PI*2); ctx.fill();
        ctx.restore();
    }
}

// ── Score popup text ──────────────────────────────────
var popups=[];
function spawnPopup(x,y,text,color){
    popups.push({x:x,y:y,text:text,color:color,life:1,ml:1.4});
}
function updatePopups(dt){
    for(var i=popups.length-1;i>=0;i--){
        popups[i].y-=35*dt;
        popups[i].life-=dt/popups[i].ml;
        if(popups[i].life<=0) popups.splice(i,1);
    }
}
function drawPopups(){
    for(var i=0;i<popups.length;i++){
        var p=popups[i];
        ctx.save();
        ctx.globalAlpha=Math.max(0,p.life);
        ctx.shadowColor=p.color; ctx.shadowBlur=14;
        ctx.fillStyle=p.color;
        ctx.font='bold 22px Quicksand,sans-serif';
        ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText(p.text,p.x,p.y);
        ctx.restore();
    }
}

// ── Bonus stars ───────────────────────────────────────
var bonusStars=[];
function spawnBonusStar(){
    bonusStars.push({
        x:30+Math.random()*(SW-60), y:-20,
        vy:80+Math.random()*60, r:14+Math.random()*10,
        c:['#ffd700','#ff96c8','#b496ff','#96ffdc'][Math.floor(Math.random()*4)],
        life:1, clicked:false
    });
}
function updateBonusStars(dt){
    for(var i=bonusStars.length-1;i>=0;i--){
        bonusStars[i].y+=bonusStars[i].vy*dt;
        if(bonusStars[i].y>SH+40) bonusStars.splice(i,1);
    }
}
function drawBonusStars(t){
    for(var i=0;i<bonusStars.length;i++){
        var s=bonusStars[i];
        ctx.save();
        ctx.shadowColor=s.c; ctx.shadowBlur=22;
        ctx.fillStyle=s.c;
        ctx.globalAlpha=0.9;
        // 5-pointed star
        ctx.beginPath();
        for(var p=0;p<5;p++){
            var a0=Math.PI/2+p*(Math.PI*2/5)+t*1.5;
            var a1=a0+Math.PI/5;
            if(p===0) ctx.moveTo(s.x+Math.cos(a0)*s.r,s.y+Math.sin(a0)*s.r);
            else ctx.lineTo(s.x+Math.cos(a0)*s.r,s.y+Math.sin(a0)*s.r);
            ctx.lineTo(s.x+Math.cos(a1)*s.r*0.44,s.y+Math.sin(a1)*s.r*0.44);
        }
        ctx.closePath(); ctx.fill();
        ctx.restore();
    }
}

// ── Game State ────────────────────────────────────────
var started=false, gameOver=false;
var score=0, throwsLeft=10, wishStreak=0, wishTotal=0;
var savedScore=false;
var THROWS_PER_GAME=10;

// Well
var wellX, wellY, wellW=80, wellH=70;
var wellDir=1, wellSpeed=55, wellRange;

// Active coin in flight
var coin=null; // {sx,sy,tx,ty,t,dur,alpha}
var COIN_DUR=0.9;

// Throwing state
var isThrowing=false;

// Bonus round
var bonusActive=false, bonusTimer=0, BONUS_DUR=8;
var bonusSpawnTimer=0;
var throwsBeforeBonus=0; // save throws count during bonus

// Result text flash
var resultFlash=null; // {text,color,timer}

// Animation
var lastTs=0, rafId=null;

function startGame(){
    document.getElementById('start-screen').style.display='none';
    document.getElementById('ui').style.display='flex';
    initGame();
    started=true;
    lastTs=performance.now();
    rafId=requestAnimationFrame(loop);
}

function initGame(){
    score=0; throwsLeft=THROWS_PER_GAME; wishStreak=0; wishTotal=0;
    savedScore=false; gameOver=false;
    coin=null; isThrowing=false;
    bonusActive=false; bonusTimer=0;
    sparks.length=0; popups.length=0; bonusStars.length=0;
    wellRange = (SW/2 - wellW*0.7);
    wellX=SW/2; wellY=SH*0.38;
    wellDir=1;
    updateHUD();
}

function restartGame(){
    document.getElementById('game-over').classList.remove('show');
    initGame();
    gameOver=false; savedScore=false;
    lastTs=performance.now();
    if(!rafId) rafId=requestAnimationFrame(loop);
}

function updateHUD(){
    document.getElementById('score-disp').textContent='✦ '+score;
    document.getElementById('throws-disp').textContent='🪙 '+throwsLeft;
}

// ── Throw a coin ──────────────────────────────────────
function throwCoin(tapX, tapY){
    if(coin||gameOver||isThrowing) return;
    if(!bonusActive && throwsLeft<=0) return;

    var sx=SW/2, sy=SH-80;
    isThrowing=true;
    coin={sx:sx,sy:sy,tx:tapX,ty:tapY,elapsed:0,dur:COIN_DUR,alpha:1};
}

// Parabolic position at time fraction p (0..1)
function coinPos(c, p){
    var x=c.sx+(c.tx-c.sx)*p;
    var baseY=c.sy+(c.ty-c.sy)*p;
    // Arc upward in the middle
    var arcH=Math.min(SH*0.45, Math.abs(c.tx-c.sx)*0.6 + (c.sy-c.ty)*0.5 + 80);
    var arcY=baseY - Math.sin(p*Math.PI)*arcH;
    return {x:x,y:arcY};
}

// ── Check hit on well ─────────────────────────────────
function checkWellHit(cx, cy){
    // Well opening center
    var openX=wellX, openY=wellY-wellH*0.05;
    var openRX=wellW*0.38, openRY=wellH*0.09;
    // Normalize to circle
    var dx=(cx-openX)/openRX, dy=(cy-openY)/openRY;
    var dist=Math.sqrt(dx*dx+dy*dy);

    if(dist<=1.0){
        // Hit!
        var pts, label, color;
        if(dist<=0.25){ pts=15; label='✨ WISH!'; color='#ffd700'; wishStreak++; wishTotal++; triggerWishFlash(); }
        else if(dist<=0.55){ pts=8; label='💫 Lucky!'; color='#ffee88'; wishStreak=0; }
        else { pts=3; label='🌀 Rim!'; color='#96ffdc'; wishStreak=0; }
        score+=pts;
        spawnSparks(openX,openY,color,pts===15?28:pts===8?16:8);
        spawnPopup(openX,openY-30,label+' +'+pts,color);
        if(wishStreak>=3){ wishStreak=0; startBonusRound(); }
        return true;
    } else {
        wishStreak=0;
        spawnSparks(cx,cy,'#604860',6);
        spawnPopup(cx,cy-20,'Miss','#604060');
        return false;
    }
}

function triggerWishFlash(){
    var el=document.getElementById('wish-flash');
    el.style.display='block';
    el.style.animation='none';
    void el.offsetWidth;
    el.style.animation='wishFade 0.8s ease-out forwards';
    setTimeout(function(){ el.style.display='none'; }, 800);
}

// ── Bonus round ───────────────────────────────────────
function startBonusRound(){
    bonusActive=true; bonusTimer=BONUS_DUR; bonusSpawnTimer=0;
    throwsBeforeBonus=throwsLeft;
    var bb=document.getElementById('bonus-banner');
    bb.style.display='block';
    setTimeout(function(){ bb.style.display='none'; }, 2200);
    spawnPopup(SW/2, SH*0.35, '⭐ BONUS ROUND! ⭐', '#ffd700');
}

function endBonusRound(){
    bonusActive=false;
    bonusStars.length=0;
    spawnPopup(SW/2, SH*0.35, 'Bonus over! +'+score+'pts total', '#b496ff');
}

function tapBonusStar(tapX, tapY){
    for(var i=bonusStars.length-1;i>=0;i--){
        var s=bonusStars[i];
        var d=Math.sqrt((tapX-s.x)*(tapX-s.x)+(tapY-s.y)*(tapY-s.y));
        if(d<=s.r+10){
            score+=3;
            spawnSparks(s.x,s.y,s.c,10);
            spawnPopup(s.x,s.y-20,'+3',s.c);
            bonusStars.splice(i,1);
            updateHUD();
            return true;
        }
    }
    return false;
}

// ── End game ──────────────────────────────────────────
function endGame(){
    gameOver=true;
    document.getElementById('final-score').textContent=score;
    document.getElementById('final-detail').innerHTML=
        '🪙 Coins thrown: '+THROWS_PER_GAME+'<br>'+
        '✨ Wishes granted: '+wishTotal+'<br>'+
        (wishTotal>=3?'🌟 Triggered a Bonus Round!<br>':'');
    document.getElementById('game-over').classList.add('show');
    if(!savedScore){
        savedScore=true;
        fetch('/api/scores',{method:'POST',headers:{'Content-Type':'application/json'},
            body:JSON.stringify({game:'wishing_well',score:score,details:{wishes:wishTotal}})
        }).catch(function(){});
    }
}

// ── Draw trajectory preview ───────────────────────────
var aimX=-1, aimY=-1;
function drawTrajectory(tx, ty){
    if(tx<0) return;
    var sx=SW/2, sy=SH-80;
    ctx.save();
    ctx.setLineDash([6,8]);
    ctx.strokeStyle='rgba(255,215,0,0.25)'; ctx.lineWidth=1.5;
    ctx.beginPath();
    for(var step=0;step<=20;step++){
        var p=step/20;
        var pos=coinPos({sx:sx,sy:sy,tx:tx,ty:ty,dur:COIN_DUR},p);
        if(step===0) ctx.moveTo(pos.x,pos.y);
        else ctx.lineTo(pos.x,pos.y);
    }
    ctx.stroke();
    ctx.setLineDash([]);
    // Small coin preview at end
    ctx.globalAlpha=0.4;
    ctx.shadowColor='#ffd700'; ctx.shadowBlur=10;
    ctx.fillStyle='#ffd700';
    ctx.beginPath(); ctx.arc(tx,ty,7,0,Math.PI*2); ctx.fill();
    ctx.restore();
}

// ── Draw bonus timer bar ──────────────────────────────
function drawBonusBar(){
    var pct=bonusTimer/BONUS_DUR;
    ctx.fillStyle='rgba(255,215,0,0.12)'; ctx.fillRect(0,SH-8,SW,8);
    var g=ctx.createLinearGradient(0,0,SW,0);
    g.addColorStop(0,'#ffd700'); g.addColorStop(1,'#ff96c8');
    ctx.fillStyle=g; ctx.fillRect(0,SH-8,SW*pct,8);
    ctx.fillStyle='rgba(255,255,255,0.3)'; ctx.font='bold 12px Quicksand,sans-serif';
    ctx.textAlign='center'; ctx.fillText('✨ BONUS ✨',SW/2,SH-12);
}

// ── Main loop ─────────────────────────────────────────
function loop(ts){
    var dt=Math.min((ts-lastTs)/1000, 0.05); lastTs=ts;
    if(!gameOver) update(dt, ts/1000);
    draw(ts/1000);
    rafId=requestAnimationFrame(loop);
}

function update(dt, t){
    // Move well
    wellX += wellDir * wellSpeed * dt;
    if(wellX > SW/2+wellRange){ wellX=SW/2+wellRange; wellDir=-1; }
    if(wellX < SW/2-wellRange){ wellX=SW/2-wellRange; wellDir=1; }

    // Update coin
    if(coin){
        coin.elapsed+=dt;
        if(coin.elapsed>=coin.dur){
            var endPos=coinPos(coin,1);
            checkWellHit(endPos.x, endPos.y);
            coin=null;
            isThrowing=false;
            if(!bonusActive){
                throwsLeft--;
                updateHUD();
                if(throwsLeft<=0) setTimeout(endGame, 800);
            }
        }
    }

    // Bonus round
    if(bonusActive){
        bonusTimer-=dt;
        bonusSpawnTimer-=dt;
        if(bonusSpawnTimer<=0){ bonusSpawnTimer=0.35; spawnBonusStar(); }
        updateBonusStars(dt);
        if(bonusTimer<=0) endBonusRound();
    }

    updateSparks(dt);
    updatePopups(dt);
}

function draw(t){
    drawBackground(t);

    // Ground platform
    var gGrad=ctx.createLinearGradient(0,SH*0.65,0,SH*0.68);
    gGrad.addColorStop(0,'#1a1030'); gGrad.addColorStop(1,'#0a0820');
    ctx.fillStyle=gGrad; ctx.fillRect(0,SH*0.65,SW,SH*0.03);
    ctx.fillStyle='#100820'; ctx.fillRect(0,SH*0.68,SW,SH);

    // Trajectory preview
    if(!coin && !gameOver && throwsLeft>0 && aimX>0) drawTrajectory(aimX, aimY);

    // Well
    drawWell(wellX, wellY, t, !coin && throwsLeft>0 && !gameOver);

    // Active coin
    if(coin){
        var p=Math.min(1,coin.elapsed/coin.dur);
        var pos=coinPos(coin,p);
        drawCoin(pos.x,pos.y,9,1,t);
    }

    // Bonus stars
    if(bonusActive) drawBonusStars(t);

    // Fairy
    drawFairy(SW/2, SH-70, t, !!coin);

    // Particles
    drawSparks();
    drawPopups();

    // Bonus bar
    if(bonusActive) drawBonusBar();

    // Streak indicator
    if(wishStreak>0){
        ctx.save();
        ctx.fillStyle='#ffd700'; ctx.font='bold 13px Quicksand,sans-serif';
        ctx.textAlign='center';
        ctx.shadowColor='#ffd700'; ctx.shadowBlur=10;
        ctx.fillText('Wish streak: '+wishStreak+' / 3 ✨', SW/2, SH-110);
        ctx.restore();
    }
}

// ── Input ─────────────────────────────────────────────
canvas.addEventListener('pointermove', function(e){
    if(!started||gameOver||bonusActive||coin) return;
    var r=canvas.getBoundingClientRect();
    aimX=e.clientX-r.left; aimY=e.clientY-r.top;
});

canvas.addEventListener('pointerdown', function(e){
    if(!started||gameOver) return;
    e.preventDefault();
    var r=canvas.getBoundingClientRect();
    var tx=e.clientX-r.left, ty=e.clientY-r.top;

    if(bonusActive){
        tapBonusStar(tx,ty);
        return;
    }
    if(throwsLeft<=0||coin) return;
    throwCoin(tx, ty);
    aimX=-1;
},{passive:false});

canvas.addEventListener('pointerleave', function(){
    aimX=-1; aimY=-1;
});
</script>
